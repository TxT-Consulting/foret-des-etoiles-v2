<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Forêt des Étoiles ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #7C3AED; --pink: #EC4899; --teal: #0D9488;
  --gold: #F59E0B; --bg: #0F0A1E; --text: #F1F5F9; --dim: #94A3B8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

#stars {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(1px 1px at 8% 12%, #fff, transparent),
    radial-gradient(1.5px 1.5px at 22% 38%, #FFE4B5, transparent),
    radial-gradient(1px 1px at 37% 8%, #fff, transparent),
    radial-gradient(2px 2px at 53% 67%, #E0E7FF, transparent),
    radial-gradient(1px 1px at 68% 22%, #fff, transparent),
    radial-gradient(1.5px 1.5px at 78% 52%, #FFF9C4, transparent),
    radial-gradient(1px 1px at 89% 78%, #fff, transparent),
    radial-gradient(2px 2px at 14% 83%, #E0E7FF, transparent),
    radial-gradient(1px 1px at 44% 91%, #fff, transparent),
    radial-gradient(1.5px 1.5px at 61% 42%, #FFE4B5, transparent),
    radial-gradient(1px 1px at 4% 48%, #fff, transparent),
    radial-gradient(1px 1px at 95% 31%, #fff, transparent),
    linear-gradient(to bottom, #0F0A1E 0%, #1a0933 50%, #0F0A1E 100%);
}

/* Top bar */
#top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 20px;
  background: rgba(15,10,30,0.85);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(139,92,246,0.2);
}
.top-left { display: flex; align-items: center; gap: 12px; }
.top-right { display: flex; align-items: center; gap: 10px; }
#char-pill {
  display: none; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.08); border-radius: 20px;
  padding: 4px 12px; font-size: 0.85rem; font-weight: 700;
}
.sound-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; opacity: 0.7; }
.sound-btn:hover { opacity: 1; }

/* HP bar */
#hp-wrap {
  display: none; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.08); border-radius: 20px;
  padding: 4px 12px; font-size: 0.85rem; font-weight: 800;
}
#hp-bar-outer { width: 80px; height: 8px; background: rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden; }
#hp-bar { height: 100%; background: #10B981; border-radius: 4px; transition: width 0.4s ease, background 0.3s; }

/* Inventory */
#inventory-bar {
  display: none; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(139,92,246,0.3);
  border-radius: 20px; padding: 4px 14px;
  font-size: 1rem;
}

#app {
  position: relative; z-index: 1;
  max-width: 680px; margin: 0 auto;
  padding: 80px 16px 60px;
  min-height: 100vh;
  display: flex; flex-direction: column; justify-content: center;
}

/* Scene */
.scene-art {
  text-align: center; font-size: 5rem; margin-bottom: 16px;
  animation: floatArt 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(139,92,246,0.6));
}
@keyframes floatArt { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

.story-card {
  background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(236,72,153,0.08));
  border: 1px solid rgba(139,92,246,0.3);
  border-radius: 24px; padding: 28px 24px; margin-bottom: 20px;
  backdrop-filter: blur(10px);
  animation: fadeSlide 0.5s ease;
}
@keyframes fadeSlide { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

.scene-title {
  font-family: 'Playfair Display', serif; font-size: 1.4rem;
  color: #C4B5FD; margin-bottom: 16px; line-height: 1.3;
}
.scene-text { font-size: 1.05rem; line-height: 1.8; color: #E2E8F0; }
.scene-text p { margin-bottom: 10px; }

/* Choices */
.choices { display: flex; flex-direction: column; gap: 12px; }
.choice-btn {
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(139,92,246,0.4);
  border-radius: 16px; padding: 16px 20px;
  font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700;
  color: #E2E8F0; cursor: pointer; text-align: left;
  transition: all 0.2s;
  display: flex; align-items: flex-start; gap: 12px;
}
.choice-btn:hover {
  background: rgba(124,58,237,0.25); border-color: #8B5CF6;
  transform: translateX(4px); box-shadow: 0 0 20px rgba(124,58,237,0.3);
}
.choice-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
.choice-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 1px; }
.choice-body { flex: 1; }
.choice-main { display: block; }
.choice-hint { display: block; font-size: 0.78rem; color: #C4B5FD; font-weight: 600; margin-top: 2px; }

/* Combat */
.combat-card {
  background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(124,58,237,0.1));
  border: 1px solid rgba(239,68,68,0.4);
  border-radius: 24px; padding: 24px; margin-bottom: 20px;
  animation: fadeSlide 0.5s ease;
}
.combat-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #FCA5A5; margin-bottom: 20px; text-align: center; }
.combatants { display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; align-items: center; margin-bottom: 20px; }
.combatant { text-align: center; }
.combatant-name { font-size: 0.85rem; font-weight: 800; color: #C4B5FD; margin-bottom: 6px; }
.combatant-emoji { font-size: 2.5rem; margin-bottom: 8px; }
.hp-label { font-size: 0.8rem; font-weight: 700; margin-bottom: 4px; }
.hp-bar-wrap { height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; }
.hp-bar-fill { height: 100%; border-radius: 5px; transition: width 0.5s ease; }
.hp-player { background: linear-gradient(90deg, #10B981, #34D399); }
.hp-enemy { background: linear-gradient(90deg, #EF4444, #F87171); }
.vs-text { font-size: 1.5rem; font-weight: 900; color: #F59E0B; }

.dice-area { text-align: center; min-height: 60px; margin-bottom: 16px; }
.dice-result { font-size: 0.95rem; color: #E2E8F0; line-height: 1.6; }
.dice-spin { animation: diceSpin 0.4s ease; display: inline-block; font-size: 2rem; }
@keyframes diceSpin { 0%{transform:rotate(0deg) scale(0.5)} 50%{transform:rotate(180deg) scale(1.2)} 100%{transform:rotate(360deg) scale(1)} }

.combat-actions { display: flex; flex-direction: column; gap: 10px; }
.combat-btn {
  background: rgba(255,255,255,0.07); border: 1.5px solid rgba(139,92,246,0.4);
  border-radius: 14px; padding: 14px 20px;
  font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 800;
  color: #E2E8F0; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 10px;
}
.combat-btn:hover:not(:disabled) { background: rgba(124,58,237,0.3); transform: scale(1.02); }
.combat-btn:disabled { opacity: 0.4; cursor: default; }
.combat-btn.danger { border-color: rgba(239,68,68,0.5); }
.combat-btn.danger:hover:not(:disabled) { background: rgba(239,68,68,0.2); }

/* Typewriter */
.typewriter-char { animation: fadeChar 0.03s ease forwards; opacity: 0; }
@keyframes fadeChar { to { opacity: 1; } }

/* Characters */
.char-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 20px 0; }
.char-card {
  background: rgba(255,255,255,0.05); border: 2px solid rgba(139,92,246,0.3);
  border-radius: 20px; padding: 20px 12px; text-align: center; cursor: pointer;
  transition: all 0.25s;
}
.char-card:hover { border-color: #8B5CF6; background: rgba(124,58,237,0.2); transform: translateY(-4px); box-shadow: 0 8px 30px rgba(124,58,237,0.3); }
.char-emoji { font-size: 3rem; margin-bottom: 8px; }
.char-name { font-size: 0.95rem; font-weight: 900; color: #C4B5FD; margin-bottom: 4px; }
.char-trait { font-size: 0.78rem; color: #94A3B8; }
.char-power { font-size: 0.75rem; color: #F59E0B; margin-top: 6px; font-weight: 700; }
.char-stats { font-size: 0.72rem; color: #6EE7B7; margin-top: 4px; font-weight: 700; }

/* Title */
.title-main {
  font-family: 'Playfair Display', serif; font-size: 2.4rem; text-align: center;
  background: linear-gradient(135deg, #C4B5FD, #F9A8D4, #FDE68A);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px; line-height: 1.2;
}
.title-sub { text-align: center; color: var(--dim); font-size: 1rem; margin-bottom: 28px; }

/* Ending */
.ending-card { text-align: center; padding: 36px 24px; }
.ending-badge { display: inline-block; padding: 6px 20px; border-radius: 20px; font-size: 0.85rem; font-weight: 800; margin-bottom: 16px; }
.ending-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 16px; line-height: 1.3; }
.ending-text { font-size: 1rem; line-height: 1.8; color: #CBD5E1; margin-bottom: 28px; }
.restart-btn {
  background: linear-gradient(135deg, #7C3AED, #EC4899); border: none; border-radius: 16px;
  padding: 16px 32px; font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 900;
  color: white; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px rgba(124,58,237,0.4);
}
.restart-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.5); }

/* Particles */
.particle {
  position: fixed; pointer-events: none; z-index: 999;
  border-radius: 50%; animation: particleFall 1.5s ease-in forwards;
}
@keyframes particleFall {
  0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

@keyframes popIn { 0%{transform:scale(0.8);opacity:0} 70%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
.pop-in { animation: popIn 0.35s ease; }

@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
.shake { animation: shake 0.3s ease; }

@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
.pulse { animation: pulse 0.4s ease; }

@media (max-width: 480px) {
  .char-grid { grid-template-columns: 1fr; }
  .title-main { font-size: 1.8rem; }
  .combatants { grid-template-columns: 1fr auto 1fr; gap: 8px; }
}
</style>
</head>
<body>
<div id="stars"></div>

<div id="top-bar">
  <div class="top-left">
    <div id="char-pill"></div>
    <div id="hp-wrap">
      ❤️ <div id="hp-bar-outer"><div id="hp-bar"></div></div>
      <span id="hp-text">10</span>
    </div>
  </div>
  <div class="top-right">
    <div id="inventory-bar"></div>
    <button class="sound-btn" id="sound-btn" onclick="toggleSound()" title="Son">🔊</button>
  </div>
</div>

<div id="app"></div>

<script>
// ══════════════════════════════════════════════════════════════
// AUDIO ENGINE
// ══════════════════════════════════════════════════════════════
let audioCtx = null;
let musicNodes = [];
let soundEnabled = true;

function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { soundEnabled = false; }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function stopMusic() {
  musicNodes.forEach(n => { try { n.stop(); } catch(e) {} });
  musicNodes = [];
}

function playAmbient(mood) {
  if (!soundEnabled) return;
  initAudio();
  if (!audioCtx) return;
  stopMusic();

  const master = audioCtx.createGain();
  master.gain.value = 0.06;
  master.connect(audioCtx.destination);

  const configs = {
    forest:  [[55, 'sine', 0.4], [110, 'sine', 0.2], [165, 'sine', 0.15]],
    dungeon: [[41, 'sine', 0.5], [82, 'triangle', 0.2], [123, 'sine', 0.1]],
    battle:  [[55, 'sawtooth', 0.15], [110, 'square', 0.1], [220, 'sawtooth', 0.08]],
    victory: [[262, 'sine', 0.3], [330, 'sine', 0.25], [392, 'sine', 0.2]],
    mystery: [[46, 'sine', 0.4], [58, 'sine', 0.3], [138, 'sine', 0.1]],
  };

  const chosen = configs[mood] || configs.forest;
  chosen.forEach(([freq, type, vol]) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();

    lfo.frequency.value = 0.2 + Math.random() * 0.3;
    lfoGain.gain.value = freq * 0.015;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);

    osc.type = type;
    osc.frequency.value = freq;
    g.gain.value = vol;
    osc.connect(g);
    g.connect(master);

    lfo.start();
    osc.start();
    musicNodes.push(osc, lfo);
  });
}

function playSFX(type) {
  if (!soundEnabled) return;
  initAudio();
  if (!audioCtx) return;

  const now = audioCtx.currentTime;
  const sfxs = {
    click: () => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value = 440; o.type = 'sine';
      g.gain.setValueAtTime(0.15, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
      o.start(now); o.stop(now + 0.08);
    },
    hit: () => {
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i/data.length);
      const src = audioCtx.createBufferSource();
      const g = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass'; filter.frequency.value = 600;
      src.buffer = buf; src.connect(filter); filter.connect(g); g.connect(audioCtx.destination);
      g.gain.value = 0.4;
      src.start(now);
    },
    victory: () => {
      [523, 659, 784, 1047].forEach((f, i) => {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = f; o.type = 'sine';
        const t = now + i * 0.12;
        g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
        o.start(t); o.stop(t + 0.25);
      });
    },
    magic: () => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.setValueAtTime(440, now);
      o.frequency.exponentialRampToValueAtTime(880, now + 0.3);
      o.type = 'sine';
      g.gain.setValueAtTime(0.15, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      o.start(now); o.stop(now + 0.3);
    },
    damage: () => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.setValueAtTime(300, now);
      o.frequency.exponentialRampToValueAtTime(80, now + 0.3);
      o.type = 'sawtooth';
      g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      o.start(now); o.stop(now + 0.3);
    },
    pickup: () => {
      [880, 1100, 1320].forEach((f, i) => {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = f; o.type = 'sine';
        const t = now + i * 0.07;
        g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
        o.start(t); o.stop(t + 0.1);
      });
    },
  };
  (sfxs[type] || sfxs.click)();
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('sound-btn').textContent = soundEnabled ? '🔊' : '🔇';
  if (!soundEnabled) { stopMusic(); } else { playAmbient(STATE.currentMood || 'forest'); }
}

// ══════════════════════════════════════════════════════════════
// CHARACTERS
// ══════════════════════════════════════════════════════════════
const CHARS = {
  lea: {
    name: 'Léa la Courageuse', emoji: '⚔️', short: 'Léa', color: '#F87171',
    trait: 'Brave et déterminée', power: '⚡ Bonus de combat +2',
    stats: '⚔️ ATK+2  ❤️ HP: 12', maxHp: 12, atkBonus: 2,
  },
  zoe: {
    name: 'Zoé la Maligne', emoji: '🔮', short: 'Zoé', color: '#818CF8',
    trait: 'Curieuse et intelligente', power: '🧩 Débloque des chemins cachés',
    stats: '🧩 PWR+1  ❤️ HP: 10', maxHp: 10, atkBonus: 1,
  },
  mia: {
    name: 'Mia la Gentille', emoji: '🌸', short: 'Mia', color: '#34D399',
    trait: 'Douce et empathique', power: '💚 Parle aux animaux',
    stats: '💚 CHARM+3  ❤️ HP: 10', maxHp: 10, atkBonus: 0,
  },
};

// ══════════════════════════════════════════════════════════════
// ITEMS
// ══════════════════════════════════════════════════════════════
const ITEMS = {
  bouclier_courage: { emoji: '🛡️', name: 'Bouclier', desc: 'Réduit les dégâts en combat' },
  carte_secrete:    { emoji: '🗺️', name: 'Carte secrète', desc: 'Révèle les passages cachés' },
  fleur_lumiere:    { emoji: '🌺', name: 'Fleur de lumière', desc: 'Guérit la Reine' },
  cristal_fragment: { emoji: '💎', name: 'Fragment de cristal', desc: 'La moitié manquante' },
  plume_doree:      { emoji: '🪶', name: 'Plume dorée', desc: 'Écriture magique' },
  potion_force:     { emoji: '⚗️', name: 'Potion de force', desc: '+3 ATK pendant un combat' },
};

// ══════════════════════════════════════════════════════════════
// STORY
// ══════════════════════════════════════════════════════════════
const STORY = {

  start: {
    mood: 'forest', art: '🌲✨🌲',
    title: 'Une nuit pas comme les autres',
    text: `<p>C'est une nuit d'été douce et silencieuse. Tu t'apprêtes à aller dormir quand soudain… une lumière dorée traverse ta fenêtre et danse sur les murs.</p>
           <p>Tu te lèves, curieuse. Au fond du jardin, là où pousse le vieux chêne, une <strong>porte dorée</strong> brille dans l'obscurité. Des mots scintillent sur le bois : <em>"La Forêt des Étoiles a besoin de toi."</em></p>`,
    choices: [
      { icon: '🚪', text: 'Pousser la porte sans hésiter', hint: 'Pour les plus courageuses', next: 'entree_foret' },
      { icon: '🔦', text: 'Prendre ta lampe de poche et approcher prudemment', hint: 'Prudente et curieuse', next: 'observer_porte' },
      { icon: '😴', text: 'Pincer ton bras pour voir si tu rêves', hint: 'Aïe ! C\'est bien réel.', next: 'pincer_bras' },
    ],
  },

  pincer_bras: {
    mood: 'forest', art: '😲✨',
    title: 'Bien réel !',
    text: `<p>Tu te pinces le bras. <em>Aïe !</em> Ce n'est pas un rêve.</p>
           <p>La porte s'illumine un peu plus, comme si elle t'encourageait. Une voix douce murmure de l'autre côté : <em>"Je sais que tu as peur. Mais tu es la seule qui peut nous aider."</em></p>`,
    choices: [
      { icon: '💪', text: 'Prendre son courage à deux mains et entrer', next: 'entree_foret' },
      { icon: '🔦', text: 'Observer encore un peu avant', next: 'observer_porte' },
    ],
  },

  observer_porte: {
    mood: 'forest', art: '🔦🚪🦊',
    title: 'La renarde argentée',
    text: `<p>Ta lampe éclaire la porte. Elle est couverte de symboles : des étoiles, des lunes, et… une <strong>renarde dessinée en argent</strong> qui semble te regarder.</p>
           <p>La renarde cligne de l'œil. Puis elle parle : <em>"Enfin ! Je t'attendais depuis trois nuits. La Reine de la Nuit a volé le Cristal des Étoiles. Sans lui, notre forêt va disparaître avant l'aube du quatrième jour."</em></p>`,
    choices: [
      { icon: '✨', text: 'Accepter d\'aider sans poser de questions', next: 'entree_foret' },
      { icon: '❓', text: 'Demander ce qu\'est le Cristal des Étoiles exactement', next: 'explication_cristal' },
      { icon: '🤔', text: 'Demander pourquoi c\'est TOI qu\'on appelle', next: 'pourquoi_moi' },
    ],
  },

  explication_cristal: {
    mood: 'forest', art: '💎🌟',

const STATE = {
  char: null,
  playerHp: 10,
  maxHp: 10,
  inventory: [],
  history: [],
  currentMood: 'forest',
  combat: null,
};

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
function hasItem(key) { return STATE.inventory.includes(key); }
function addItem(key) {
  if (!hasItem(key)) {
    STATE.inventory.push(key);
    playSFX('pickup');
    renderInventoryBar();
  }
}

function updateHPBar() {
  const pct = Math.max(0, (STATE.playerHp / STATE.maxHp) * 100);
  const bar = document.getElementById('hp-bar');
  const txt = document.getElementById('hp-text');
  if (!bar) return;
  bar.style.width = pct + '%';
  bar.style.background = pct > 60 ? '#10B981' : pct > 30 ? '#F59E0B' : '#EF4444';
  if (txt) txt.textContent = STATE.playerHp;
}

function renderInventoryBar() {
  const bar = document.getElementById('inventory-bar');
  if (!bar) return;
  if (STATE.inventory.length === 0) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  bar.innerHTML = STATE.inventory.map(k => `<span title="${ITEMS[k]?.name || k}">${ITEMS[k]?.emoji || '?'}</span>`).join('');
}

function renderCharPill() {
  const pill = document.getElementById('char-pill');
  const hpWrap = document.getElementById('hp-wrap');
  if (!STATE.char) { pill.style.display = 'none'; hpWrap.style.display = 'none'; return; }
  const c = CHARS[STATE.char];
  pill.style.display = 'flex';
  pill.style.color = c.color;
  pill.innerHTML = `${c.emoji} ${c.short}`;
  hpWrap.style.display = 'flex';
  updateHPBar();
}

function particles(n = 25) {
  const colors = ['#C4B5FD','#F9A8D4','#FDE68A','#A7F3D0','#7C3AED','#EC4899'];
  for (let i = 0; i < n; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.style.cssText = `left:${Math.random()*100}vw; width:${6+Math.random()*8}px; height:${6+Math.random()*8}px; background:${colors[Math.floor(Math.random()*colors.length)]}; animation-delay:${Math.random()*0.8}s;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }
}

function typewrite(element, html, done) {
  // Strip HTML and animate text only for performance
  element.innerHTML = html;
  // Simple: just show instantly for complex HTML, animate only plain text nodes
  element.style.opacity = '0';
  element.style.transition = 'opacity 0.4s';
  setTimeout(() => { element.style.opacity = '1'; if (done) done(); }, 50);
}

// ══════════════════════════════════════════════════════════════
// COMBAT SYSTEM
// ══════════════════════════════════════════════════════════════
function startCombat(sceneKey) {
  const config = STORY[sceneKey];
  const char = CHARS[STATE.char];
  STATE.combat = {
    enemy: { ...config.enemy },
    defending: false,
    potionUsed: false,
    nextWin: config.next_win,
    nextLose: config.next_lose,
  };
  playAmbient('battle');
  renderCombat();
}

        <button class="combat-btn" onclick="combatAction('defend')">🛡️ <span>Défendre</span> <span style="color:#C4B5FD;font-size:0.8rem;margin-left:auto">+2 prochaine ATK</span></button>
        ${hasItem('potion_force') && !c.potionUsed ? `<button class="combat-btn" onclick="combatAction('potion')">⚗️ <span>Utiliser la potion de force</span> <span style="color:#F59E0B;font-size:0.8rem;margin-left:auto">+3 ATK ce tour</span></button>` : ''}
        ${hasItem('bouclier_courage') ? `<button class="combat-btn" onclick="combatAction('bouclier')">🛡️ <span>Lever le bouclier du phénix</span> <span style="color:#C4B5FD;font-size:0.8rem;margin-left:auto">Bloquer un tour</span></button>` : ''}
      </div>
    </div>
  `;
}

function rollDie(max = 6) {
  return Math.floor(Math.random() * max) + 1;
}

function combatAction(action) {
  initAudio();
  const c = STATE.combat;
  const char = CHARS[STATE.char];
  let log = '';
  let playerAtk = 0;
  let skip = false;

  if (action === 'attack') {
    const roll = rollDie();
    playerAtk = roll + char.atkBonus + (c.defending ? 2 : 0);
    log = `🎲 Tu lances le dé : <strong>${roll}</strong> + ${char.atkBonus} ATK${c.defending ? ' + 2 défense' : ''} = <strong>${playerAtk}</strong>`;
    c.defending = false;
  } else if (action === 'defend') {
    c.defending = true;
    log = '🛡️ Tu te mets en garde. +2 à ta prochaine attaque !';
    skip = true;
  } else if (action === 'potion') {
    c.potionUsed = true;
    const roll = rollDie();
    playerAtk = roll + char.atkBonus + 3;
    log = `⚗️ Potion de force ! 🎲 Dé : <strong>${roll}</strong> + ${char.atkBonus} + 3 = <strong>${playerAtk}</strong>`;
    STATE.inventory = STATE.inventory.filter(i => i !== 'potion_force');
    renderInventoryBar();
  } else if (action === 'bouclier') {
    log = '🛡️ Le bouclier du phénix absorbe toute l\'attaque ennemie ce tour !';
    skip = true;
    // enemy does 0 damage
    const enemyRoll = rollDie();
    log += `<br>👹 ${c.enemy.name} attaque pour <strong>${enemyRoll + c.enemy.atk - c.enemy.atk}</strong> (bloqué !)`;
    showDiceResult(log);
    playSFX('magic');
    setTimeout(() => {
      if (c.enemy.hp <= 0) endCombat(true);
      else if (STATE.playerHp <= 0) endCombat(false);
      else renderCombat();
    }, 1800);
    return;
  }

  if (!skip && playerAtk > 0) {
    // Player hits enemy
    const dmg = Math.max(1, playerAtk - rollDie());
    c.enemy.hp = Math.max(0, c.enemy.hp - dmg);
    log += `<br>💥 Tu infliges <strong>${dmg}</strong> dégâts !`;
    playSFX('hit');
    shakeElement('.combatant:last-child .combatant-emoji');
  }

  // Enemy counter-attack
  if (!skip && c.enemy.hp > 0) {
    const enemyRoll = rollDie();
    const enemyAtk = enemyRoll + c.enemy.atk;
    const playerDef = rollDie() + 1;
    const dmgTaken = Math.max(0, enemyAtk - playerDef);
    STATE.playerHp = Math.max(0, STATE.playerHp - dmgTaken);
    log += `<br>👹 ${c.enemy.name} attaque (${enemyRoll}+${c.enemy.atk}=${enemyAtk}), tu pares (${playerDef}) — tu reçois <strong>${dmgTaken}</strong> dégâts.`;
    if (dmgTaken > 0) playSFX('damage');
    updateHPBar();
  } else if (skip) {
    // Defend: still take some enemy damage
    if (action === 'defend') {
      const enemyRoll = rollDie();
      const dmgTaken = Math.max(0, enemyRoll);
      STATE.playerHp = Math.max(0, STATE.playerHp - dmgTaken);
      log += `<br>👹 ${c.enemy.name} attaque quand même — tu reçois <strong>${dmgTaken}</strong> dégâts réduits.`;
      if (dmgTaken > 0) playSFX('damage');
      updateHPBar();
    }
  }

  showDiceResult(log);

  setTimeout(() => {
    if (c.enemy.hp <= 0) endCombat(true);
    else if (STATE.playerHp <= 0) endCombat(false);
    else renderCombat();
  }, 2000);
}

function showDiceResult(html) {
  const el = document.getElementById('dice-result');
  if (el) {
    el.innerHTML = `<div class="dice-spin">🎲</div><br>${html}`;
    // Disable buttons during animation
    document.querySelectorAll('.combat-btn').forEach(b => b.disabled = true);
  }
}

function shakeElement(selector) {
  const el = document.querySelector(selector);
  if (el) { el.classList.add('shake'); setTimeout(() => el.classList.remove('shake'), 400); }
}

function endCombat(won) {
  STATE.combat = null;
  const scene = STORY[won ? 'temp_win' : 'temp_lose'];
  if (won) {
    playAmbient('forest');
    playSFX('victory');
    particles(30);
    // Store where to go
    render(STATE._combatNextWin);
  } else {
    STATE.playerHp = Math.max(3, Math.floor(STATE.maxHp * 0.3));
    updateHPBar();
    render('combat_lose');
  }
}

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════
function render(sceneKey) {
  STATE.history.push(sceneKey);

  const scene = STORY[sceneKey];
  if (!scene) { console.error('Unknown scene:', sceneKey); return; }

  // Handle combat scenes
  if (scene.combat) {
    STATE._combatNextWin = scene.next_win;
    STATE._combatNextLose = scene.next_lose;
    startCombat(sceneKey);
    return;
  }

  if (scene.ending) { renderEnding(scene); return; }

  // Change mood
  if (scene.mood && scene.mood !== STATE.currentMood) {
    STATE.currentMood = scene.mood;
    playAmbient(scene.mood);
  }

  // Give items
  if (scene.items_given) scene.items_given.forEach(addItem);

  // Filter choices
  let choices = scene.choices.filter(c => {
    if (c.requires_item && !hasItem(c.requires_item)) return false;
    return true;
  });

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="scene-art">${scene.art}</div>
    <div class="story-card">
      <div class="scene-title">${scene.title}</div>
      <div class="scene-text" id="scene-text-inner">${scene.text}</div>
    </div>
    <div class="choices">
      ${choices.map(c => `
        <button class="choice-btn" onclick="choose('${c.next}', this)">
          <div class="choice-icon">${c.icon}</div>
          <div class="choice-body">
            <span class="choice-main">${c.text}</span>
            ${c.hint ? `<span class="choice-hint">${c.hint}</span>` : ''}
          </div>
        </button>
      `).join('')}
    </div>
  `;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderEnding(scene) {
  stopMusic();
  playAmbient('victory');
  playSFX('victory');
  particles(40);

  const textFormatted = scene.text.split('\n\n').map(p => `<p>${p}</p>`).join('');
  document.getElementById('app').innerHTML = `
    <div class="scene-art" style="font-size:6rem">${scene.art}</div>
    <div class="story-card ending-card pop-in">
      <div class="ending-badge" style="background:${scene.badgeColor}25;color:${scene.badgeColor};border:1px solid ${scene.badgeColor}50">${scene.badge}</div>
      <div class="ending-title">${scene.title}</div>
      <div class="ending-text">${textFormatted}</div>
      <button class="restart-btn" onclick="restart()">🌟 Nouvelle aventure</button>
    </div>
  `;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderTitle() {
  stopMusic();
  document.getElementById('char-pill').style.display = 'none';
  document.getElementById('hp-wrap').style.display = 'none';
  document.getElementById('inventory-bar').style.display = 'none';

  document.getElementById('app').innerHTML = `
    <div class="scene-art" style="font-size:5rem;margin-bottom:12px">🌲✨🌙</div>
    <div class="title-main">La Forêt<br>des Étoiles</div>
    <div class="title-sub">Une aventure dont tu es le héros ✨ v2</div>
    <div class="story-card">
      <div class="scene-text">
        <p>La <strong>Reine de la Nuit</strong> a pris le Cristal des Étoiles. Sans lui, la forêt s'éteint.</p>
        <p>Mais qui est-elle vraiment ? Et pourquoi a-t-elle fait ça ?</p>
        <p>Choisis ton héroïne — chacune vit une aventure différente, avec ses propres combats, ses propres découvertes.</p>
      </div>
    </div>
    <div class="char-grid">
      ${Object.entries(CHARS).map(([key, c]) => `
        <div class="char-card" onclick="selectChar('${key}')">
          <div class="char-emoji">${c.emoji}</div>
          <div class="char-name">${c.name}</div>
          <div class="char-trait">${c.trait}</div>
          <div class="char-power">${c.power}</div>
          <div class="char-stats">${c.stats}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function selectChar(key) {
  initAudio();
  const c = CHARS[key];
  STATE.char = key;
  STATE.playerHp = c.maxHp;
  STATE.maxHp = c.maxHp;
  STATE.inventory = [];
  STATE.history = [];
  STATE.currentMood = 'forest';
  STATE.combat = null;

  renderCharPill();
  renderInventoryBar();
  playAmbient('forest');
  playSFX('magic');
  render('start');
}

function choose(next, btn) {
  playSFX('click');
  btn.disabled = true;
  btn.style.opacity = '0.5';
  setTimeout(() => render(next), 250);
}

function restart() {
  STATE.char = null;
  STATE.inventory = [];
  STATE.history = [];
  STATE.combat = null;
  STATE.playerHp = 10;
  renderTitle();
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
renderTitle();
</script>
</body>
</html>
