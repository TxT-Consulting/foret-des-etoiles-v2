<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Forêt des Étoiles ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root { --bg:#0F0A1E; --text:#F1F5F9; --dim:#94A3B8; --purple:#7C3AED; --pink:#EC4899; }
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

#stars{position:fixed;inset:0;z-index:0;background:
  radial-gradient(1px 1px at 8% 12%,#fff,transparent),radial-gradient(1.5px 1.5px at 22% 38%,#FFE4B5,transparent),
  radial-gradient(1px 1px at 37% 8%,#fff,transparent),radial-gradient(2px 2px at 53% 67%,#E0E7FF,transparent),
  radial-gradient(1px 1px at 68% 22%,#fff,transparent),radial-gradient(1.5px 1.5px at 78% 52%,#FFF9C4,transparent),
  radial-gradient(1px 1px at 89% 78%,#fff,transparent),radial-gradient(2px 2px at 14% 83%,#E0E7FF,transparent),
  radial-gradient(1px 1px at 44% 91%,#fff,transparent),radial-gradient(1.5px 1.5px at 61% 42%,#FFE4B5,transparent),
  radial-gradient(1px 1px at 4% 48%,#fff,transparent),radial-gradient(1px 1px at 95% 31%,#fff,transparent),
  radial-gradient(1px 1px at 30% 55%,#fff,transparent),radial-gradient(1.5px 1.5px at 82% 15%,#E0E7FF,transparent),
  linear-gradient(to bottom,#0F0A1E 0%,#1a0933 50%,#0F0A1E 100%)}

#top-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:10px 18px;background:rgba(15,10,30,.88);backdrop-filter:blur(8px);border-bottom:1px solid rgba(139,92,246,.2);gap:10px}
.top-left{display:flex;align-items:center;gap:10px;min-width:0}
.top-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
#char-pill{display:none;align-items:center;gap:6px;background:rgba(255,255,255,.08);border-radius:20px;padding:4px 12px;font-size:.85rem;font-weight:700;white-space:nowrap}
#hp-wrap{display:none;align-items:center;gap:6px;font-size:.8rem;font-weight:800}
#hp-bar-outer{width:70px;height:8px;background:rgba(255,255,255,.15);border-radius:4px;overflow:hidden}
#hp-bar{height:100%;background:#10B981;border-radius:4px;transition:width .4s ease,background .3s}
#inventory-bar{display:none;align-items:center;gap:4px;background:rgba(255,255,255,.05);border:1px solid rgba(139,92,246,.3);border-radius:20px;padding:4px 12px;font-size:1rem;flex-wrap:wrap}
.sound-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;opacity:.7;flex-shrink:0}
.sound-btn:hover{opacity:1}

#app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:80px 16px 60px;min-height:100vh;display:flex;flex-direction:column;justify-content:center}

.scene-art{text-align:center;font-size:4.5rem;margin-bottom:16px;animation:floatArt 3s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(139,92,246,.6))}
@keyframes floatArt{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.story-card{background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(236,72,153,.08));border:1px solid rgba(139,92,246,.3);border-radius:24px;padding:26px 22px;margin-bottom:20px;backdrop-filter:blur(10px);animation:fadeSlide .5s ease}
@keyframes fadeSlide{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.scene-title{font-family:'Playfair Display',serif;font-size:1.35rem;color:#C4B5FD;margin-bottom:14px;line-height:1.3}
.scene-text{font-size:1.02rem;line-height:1.75;color:#E2E8F0}
.scene-text p{margin-bottom:10px}
.scene-text p:last-child{margin-bottom:0}

.choices{display:flex;flex-direction:column;gap:11px}
.choice-btn{background:rgba(255,255,255,.05);border:1.5px solid rgba(139,92,246,.4);border-radius:16px;padding:15px 18px;font-family:'Nunito',sans-serif;font-size:.97rem;font-weight:700;color:#E2E8F0;cursor:pointer;text-align:left;transition:all .2s;display:flex;align-items:flex-start;gap:12px}
.choice-btn:hover{background:rgba(124,58,237,.25);border-color:#8B5CF6;transform:translateX(4px);box-shadow:0 0 20px rgba(124,58,237,.3)}
.choice-btn:disabled{opacity:.4;cursor:default;transform:none}
.choice-icon{font-size:1.35rem;flex-shrink:0;margin-top:1px}
.choice-body{flex:1}
.choice-main{display:block}
.choice-hint{display:block;font-size:.76rem;color:#C4B5FD;font-weight:600;margin-top:3px}

/* Combat */
.combat-card{background:linear-gradient(135deg,rgba(239,68,68,.15),rgba(124,58,237,.1));border:1px solid rgba(239,68,68,.4);border-radius:24px;padding:22px;margin-bottom:20px;animation:fadeSlide .5s ease}
.combat-title{font-family:'Playfair Display',serif;font-size:1.25rem;color:#FCA5A5;margin-bottom:18px;text-align:center}
.combatants{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center;margin-bottom:18px}
.combatant{text-align:center}
.c-emoji{font-size:2.3rem;margin-bottom:6px}
.c-name{font-size:.8rem;font-weight:800;color:#C4B5FD;margin-bottom:5px}
.c-hp{font-size:.78rem;font-weight:700;margin-bottom:4px}
.c-bar{height:9px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden}
.c-bar-fill{height:100%;border-radius:5px;transition:width .5s ease}
.hp-p{background:linear-gradient(90deg,#10B981,#34D399)}
.hp-e{background:linear-gradient(90deg,#EF4444,#F87171)}
.vs{font-size:1.4rem;font-weight:900;color:#F59E0B}
.dice-area{text-align:center;min-height:56px;margin-bottom:14px;font-size:.93rem;color:#E2E8F0;line-height:1.6}
.dice-spin{display:inline-block;animation:dspin .4s ease;font-size:1.8rem}
@keyframes dspin{0%{transform:rotate(0) scale(.5)}50%{transform:rotate(180deg) scale(1.2)}100%{transform:rotate(360deg) scale(1)}}
.combat-actions{display:flex;flex-direction:column;gap:9px}
.combat-btn{background:rgba(255,255,255,.07);border:1.5px solid rgba(139,92,246,.4);border-radius:13px;padding:13px 18px;font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:800;color:#E2E8F0;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px}
.combat-btn:hover:not(:disabled){background:rgba(124,58,237,.3);transform:scale(1.02)}
.combat-btn:disabled{opacity:.4;cursor:default}
.combat-btn.danger{border-color:rgba(239,68,68,.5)}
.combat-btn.danger:hover:not(:disabled){background:rgba(239,68,68,.2)}

/* Title */
.title-main{font-family:'Playfair Display',serif;font-size:2.3rem;text-align:center;background:linear-gradient(135deg,#C4B5FD,#F9A8D4,#FDE68A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;line-height:1.2}
.title-sub{text-align:center;color:var(--dim);font-size:1rem;margin-bottom:26px}
.char-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin:18px 0}
.char-card{background:rgba(255,255,255,.05);border:2px solid rgba(139,92,246,.3);border-radius:20px;padding:18px 10px;text-align:center;cursor:pointer;transition:all .25s}
.char-card:hover{border-color:#8B5CF6;background:rgba(124,58,237,.2);transform:translateY(-4px);box-shadow:0 8px 30px rgba(124,58,237,.3)}
.ch-emoji{font-size:2.8rem;margin-bottom:7px}
.ch-name{font-size:.9rem;font-weight:900;color:#C4B5FD;margin-bottom:3px}
.ch-trait{font-size:.74rem;color:#94A3B8}
.ch-power{font-size:.72rem;color:#F59E0B;margin-top:5px;font-weight:700}
.ch-stats{font-size:.7rem;color:#6EE7B7;margin-top:3px;font-weight:700}

/* Ending */
.ending-card{text-align:center;padding:32px 22px}
.end-badge{display:inline-block;padding:5px 18px;border-radius:20px;font-size:.82rem;font-weight:800;margin-bottom:14px}
.end-title{font-family:'Playfair Display',serif;font-size:1.7rem;margin-bottom:14px;line-height:1.3}
.end-text{font-size:1rem;line-height:1.8;color:#CBD5E1;margin-bottom:26px}
.end-text p{margin-bottom:12px}
.restart-btn{background:linear-gradient(135deg,#7C3AED,#EC4899);border:none;border-radius:16px;padding:15px 30px;font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:900;color:#fff;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(124,58,237,.4)}
.restart-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,58,237,.5)}

.particle{position:fixed;pointer-events:none;z-index:999;border-radius:50%;animation:pfall 1.5s ease-in forwards}
@keyframes pfall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes popIn{0%{transform:scale(.8);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.pop-in{animation:popIn .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.shake{animation:shake .3s ease}

@media(max-width:480px){.char-grid{grid-template-columns:1fr}.title-main{font-size:1.75rem}.combatants{gap:8px}}
</style>
</head>
<body>
<div id="stars"></div>
<div id="top-bar">
  <div class="top-left">
    <div id="char-pill"></div>
    <div id="hp-wrap">❤️<div id="hp-bar-outer"><div id="hp-bar"></div></div><span id="hp-txt">10</span></div>
  </div>
  <div class="top-right">
    <div id="inventory-bar"></div>
    <button class="sound-btn" id="snd-btn" onclick="toggleSound()">🔊</button>
  </div>
</div>
<div id="app"></div>

<script>
// ══════════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════════
let AC=null, musicNodes=[], soundOn=true;
function initAC(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)()}catch(e){soundOn=false}}if(AC&&AC.state==='suspended')AC.resume()}
function stopMusic(){musicNodes.forEach(n=>{try{n.stop()}catch(e){}});musicNodes=[]}
function playAmbient(mood){
  if(!soundOn)return;initAC();if(!AC)return;stopMusic();
  const master=AC.createGain();master.gain.value=.055;master.connect(AC.destination);
  const presets={
    forest:[[55,'sine',.4],[110,'sine',.2],[165,'sine',.12]],
    dungeon:[[41,'sine',.5],[82,'triangle',.2],[61,'sine',.15]],
    battle:[[55,'sawtooth',.12],[110,'square',.08],[220,'sawtooth',.06]],
    victory:[[262,'sine',.3],[330,'sine',.25],[392,'sine',.2],[524,'sine',.15]],
    mystery:[[46,'sine',.4],[58,'sine',.3],[138,'sine',.1],[69,'triangle',.2]]
  };
  (presets[mood]||presets.forest).forEach(([freq,type,vol])=>{
    const osc=AC.createOscillator(),g=AC.createGain(),lfo=AC.createOscillator(),lg=AC.createGain();
    lfo.frequency.value=.15+Math.random()*.25;lg.gain.value=freq*.012;
    lfo.connect(lg);lg.connect(osc.frequency);
    osc.type=type;osc.frequency.value=freq;g.gain.value=vol;
    osc.connect(g);g.connect(master);lfo.start();osc.start();
    musicNodes.push(osc,lfo);
  });
}
function sfx(type){
  if(!soundOn)return;initAC();if(!AC)return;
  const t=AC.currentTime;
  if(type==='click'){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.frequency.value=440;o.type='sine';g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.09);o.start(t);o.stop(t+.09)}
  else if(type==='hit'){const b=AC.createBuffer(1,AC.sampleRate*.15,AC.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const s=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();f.type='bandpass';f.frequency.value=600;s.buffer=b;s.connect(f);f.connect(g);g.connect(AC.destination);g.gain.value=.35;s.start(t)}
  else if(type==='damage'){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.frequency.setValueAtTime(280,t);o.frequency.exponentialRampToValueAtTime(80,t+.3);o.type='sawtooth';g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3)}
  else if(type==='victory'){[523,659,784,1047].forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.frequency.value=f;o.type='sine';const s=t+i*.12;g.gain.setValueAtTime(.18,s);g.gain.exponentialRampToValueAtTime(.001,s+.28);o.start(s);o.stop(s+.28)})}
  else if(type==='magic'){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(880,t+.3);o.type='sine';g.gain.setValueAtTime(.13,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3)}
  else if(type==='pickup'){[880,1100,1320].forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.frequency.value=f;o.type='sine';const s=t+i*.07;g.gain.setValueAtTime(.09,s);g.gain.exponentialRampToValueAtTime(.001,s+.1);o.start(s);o.stop(s+.1)})}
}
function toggleSound(){soundOn=!soundOn;document.getElementById('snd-btn').textContent=soundOn?'🔊':'🔇';if(!soundOn)stopMusic();else playAmbient(STATE.mood)}

// ══════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════
const CHARS={
  lea:{name:'Léa la Courageuse',emoji:'⚔️',short:'Léa',color:'#F87171',trait:'Brave et déterminée',power:'⚡ Bonus combat +2 · Options d\'action directe',stats:'❤️ HP: 12  ⚔️ ATK: +2',maxHp:12,atkBonus:2},
  zoe:{name:'Zoé la Maligne',emoji:'🔮',short:'Zoé',color:'#818CF8',trait:'Curieuse et intelligente',power:'🧩 Débloque énigmes et passages cachés',stats:'❤️ HP: 10  ⚔️ ATK: +1',maxHp:10,atkBonus:1},
  mia:{name:'Mia la Gentille',emoji:'🌸',short:'Mia',color:'#34D399',trait:'Douce et empathique',power:'💚 Parle aux animaux · Apaise les ennemis',stats:'❤️ HP: 10  ✨ Charme: +3',maxHp:10,atkBonus:0},
};

const ITEMS={
  etoile_argent:{e:'⭐',n:'Étoile d\'argent'},
  plume_doree:{e:'🪶',n:'Plume dorée'},
  bouclier_feu:{e:'🛡️',n:'Bouclier de feu'},
  carte_secrete:{e:'🗺️',n:'Carte secrète'},
  carte_chateau:{e:'🗺️',n:'Carte du château'},
  fleur_lumiere:{e:'🌺',n:'Fleur de lumière'},
  fragment_cristal:{e:'💎',n:'Fragment de cristal'},
  potion_force:{e:'⚗️',n:'Potion de force'},
  potion_soin:{e:'💊',n:'Potion de soin'},
  etoile_lac:{e:'🌟',n:'Étoile du lac'},
};

const S={  // STORY
  // ──────────────────────────────────────────
  // ACTE 1 — L'APPEL
  // ──────────────────────────────────────────
  start:{mood:'forest',art:'🌙🌟🚪',title:'La nuit de la porte dorée',
    text:`<p>C'est la nuit la plus chaude de l'été. Tu n'arrives pas à dormir. Par ta fenêtre, tu regardes les étoiles — quand soudain, l'une d'elles tombe. Pas vers le sol. Vers ton jardin.</p>
<p>Elle s'enfonce dans le vieux chêne… et le chêne s'ouvre. Derrière, une porte dorée pulse doucement, comme un cœur qui bat. Des mots brillent sur le bois en lettres de lumière : <em>"La Forêt des Étoiles a besoin de toi. Mais seulement si tu choisis de venir."</em></p>`,
    choices:[
      {icon:'⚡',text:'Pousser la porte sans réfléchir',hint:'Pour les plus courageuses',next:'a2a'},
      {icon:'🔦',text:'Prendre ta lampe et approcher prudemment',hint:'Curieuse et prudente',next:'a2b'},
      {icon:'😴',text:'Te pincer le bras — sûrement un rêve',hint:'Aïe ! C\'est bien réel.',next:'a2c'},
    ]},

  a2c:{mood:'forest',art:'😲✨',title:'Bien réel !',
    text:`<p>Tu te pinces l'avant-bras. <em>Aïe !</em> Définitivement pas un rêve. La porte s'illumine légèrement, comme si elle riait.</p>
<p>Une voix douce s'échappe de l'autre côté : <em>"Tu n'as pas besoin d'être sûre. Tu as juste besoin d'y aller."</em></p>`,
    choices:[{icon:'🔦',text:'Aller voir de plus près avec ta lampe',next:'a2b'},{icon:'🚪',text:'Entrer directement — la voix t\'a convaincue',next:'a2a'}]},

  a2a:{mood:'forest',art:'🌲✨🌿',title:'L\'entrée directe',
    text:`<p>La porte s'ouvre avec un doux soupir. De l'autre côté, une forêt impossible — des arbres hauts comme des immeubles, des lumières bleues et dorées qui flottent entre les branches, un ciel rempli d'étoiles si proches qu'on pourrait les toucher.</p>
<p>L'air sent la cannelle, les fleurs de nuit, et quelque chose d'indéfinissable. La magie, peut-être. Derrière toi, la porte se referme avec un clic doux. <em>Pas de retour en arrière.</em></p>`,
    choices:[
      {icon:'🌲',text:'Suivre le chemin de pierres lumineuses',next:'a3'},
      {icon:'🌟',text:'Explorer les environs d\'abord — quelque chose brille dans un creux d\'arbre',next:'a2a_explore'},
    ]},

  a2a_explore:{mood:'forest',art:'⭐🌲',title:'La trouvaille',
    text:`<p>Tu t'approches du vieux chêne creux. À l'intérieur, quelque chose scintille. Tu plonges la main et en ressors une petite étoile en argent, tiède, qui pulse doucement dans ta paume.</p>
<p><em>"Elle pourrait servir,"</em> penses-tu en la glissant dans ta poche.</p>`,
    items_given:['etoile_argent'],
    choices:[{icon:'🌲',text:'Prendre le chemin principal',hint:'⭐ Étoile d\'argent obtenue !',next:'a3'}]},

  a2b:{mood:'forest',art:'🔦🦊✨',title:'La renarde Lunette',
    text:`<p>Ta lampe éclaire la porte de près. Elle est couverte de symboles — des étoiles, des lunes, des arbres, et au centre, une renarde dessinée en argent qui semble regarder quelque chose au loin.</p>
<p>Puis la renarde cligne de l'œil. Elle décolle du bois comme si elle s'éveillait, flotte un instant dans l'air, et atterrit à tes pieds. <em>"Enfin ! Je t'attendais depuis trois nuits."</em></p>
<p>Elle s'appelle Lunette. En quelques phrases, elle explique tout : la Reine de la Nuit a pris le Cristal des Étoiles — le cœur de la forêt. Sans lui, les arbres s'endormiront un à un. Dans trois jours, la forêt n'existera plus.</p>`,
    choices:[
      {icon:'⚔️',text:'"Comment est-ce qu\'on bat la Reine ?"',next:'a2b_combat'},
      {icon:'🔮',text:'"Qui est vraiment la Reine ?"',next:'a2b_reine'},
      {icon:'🌸',text:'"Elle souffre ? Qu\'est-ce qui lui manque ?"',next:'a2b_souffre'},
    ]},

  a2b_combat:{mood:'forest',art:'🦊⚔️',title:'Les conseils de Lunette',
    text:`<p>Lunette soupire doucement. <em>"La combattre... ce n'est pas la bonne question. Elle n'est pas méchante. Elle souffre, profondément. La vaincre ne résoudra rien — du moins, pas seul."</em></p>
<p>Elle marque une pause. <em>"Mais si tu insistes sur la force : quelque part dans la forêt, un phénix garde un Bouclier de feu. Il peut repousser sa magie sombre."</em> Elle te sourit et disparaît.</p>`,
    choices:[{icon:'🌲',text:'Entrer dans la forêt',next:'a3'}]},

  a2b_reine:{mood:'mystery',art:'🦊🔮',title:'Le secret de la Reine',
    text:`<p>Lunette baisse la voix. <em>"Elle s'appelait Selena. Avant — avant la malédiction — elle était la gardienne des étoiles. Comme moi je garde les chemins. Belle, curieuse, aimée de toute la forêt."</em></p>
<p><em>"Il y a cent ans, une sorcière jalouse de sa lumière l'a maudite. La sorcière est morte depuis longtemps, mais la malédiction continue toute seule. Et Selena a changé — lentement — jusqu'à devenir ce qu'on appelle aujourd'hui la Reine de la Nuit."</em></p>
<p>Lunette te remet une plume dorée. <em>"Garde ça. Elle te rappellera que même les ténèbres ont une histoire."</em></p>`,
    items_given:['plume_doree'],
    choices:[{icon:'🌲',text:'Entrer dans la forêt',hint:'🪶 Plume dorée obtenue !',next:'a3'}]},

  a2b_souffre:{mood:'mystery',art:'🦊💔',title:'La douleur de Selena',
    text:`<p>Lunette te regarde longuement, comme si elle évaluait quelque chose. Puis elle pose sa petite patte sur ta main.</p>
<p><em>"Ce que tout être vivant veut, au fond. Ne plus être seule. Être vue — pas comme un monstre, pas comme une reine, juste... vue pour ce qu'elle est."</em></p>
<p><em>"Cent ans de solitude peuvent changer quelqu'un. Mais ça peut aussi se dénouer, si quelqu'un choisit vraiment de regarder."</em></p>
<p>Elle te glisse une plume dorée dans les mains avant de disparaître.</p>`,
    items_given:['plume_doree'],
    choices:[{icon:'🌲',text:'Entrer dans la forêt',hint:'🪶 Plume dorée obtenue !',next:'a3'}]},

  a3:{mood:'forest',art:'🌲🌿🌲',title:'Le carrefour des trois chemins',
    text:`<p>La forêt s'ouvre sur une clairière circulaire, parfaitement ronde, comme si quelqu'un l'avait dessinée avec un compas. Trois routes partent dans trois directions, chacune marquée d'un arc de pierres lumineuses.</p>
<p>Tu t'arrêtes. Quelque chose te tire vers l'une d'elles. Pas physiquement — plutôt comme une intuition, une résonance.</p>`,
    choices:[
      {icon:'🔥',text:'Le chemin du feu — à droite — tu aperçois des flammes et entends un cri',next:'l1'},
      {icon:'🔮',text:'Le chemin des runes — au milieu — des symboles lumineux couvrent les arbres',next:'z1'},
      {icon:'🌸',text:'Le chemin des fleurs — à gauche — un gémissement animal, des empreintes dorées',next:'m1'},
    ]},

  // ──────────────────────────────────────────
  // ACTE 2A — LÉA
  // ──────────────────────────────────────────
  l1:{mood:'forest',art:'🔥🐦‍🔥',title:'Le phénix prisonnier',
    text:`<p>Tu suis les flammes. Dans une clairière, un incendie magique fait rage — mais les arbres alentour ne brûlent pas, ils s'illuminent comme des torches enchantées.</p>
<p>Au centre, coincé sous une grosse branche tombée, un <strong>phénix bébé</strong> aux plumes rouge et or gît au sol. Ses yeux violets sont grands ouverts. Il ne crie plus. Il t'attend.</p>
<p>Trois loups de brume aux yeux phosphorescents tournent en cercle autour de lui, de plus en plus près.</p>`,
    choices:[
      {icon:'⚔️',text:'Charger les trois loups directement !',hint:'→ Combat ! Dur mais direct.',next:'cb_loups_3'},
      {icon:'🔥',text:'Allumer les torches en cercle pour les encercler de feu',next:'l1_encercler'},
      {icon:'🤫',text:'Se glisser discrètement et libérer le phénix pendant qu\'ils ne regardent pas',next:'l1_discret'},
    ]},

  l1_encercler:{mood:'battle',art:'🔥🐺🔥',title:'Le cercle de feu',
    text:`<p>Tu attrapes une torche magique accrochée à un arbre et tu tournes rapidement autour des loups, allumant les autres torches au passage. Un cercle de flammes les entoure.</p>
<p>Deux des loups battent en retraite, terrifiés. Mais le chef — un loup immense, aux yeux violets profonds — te fixe. <em>"Humaine courageuse,"</em> gronde-t-il. <em>"Mais pas assez pour moi."</em></p>
<p>Il saute par-dessus les flammes et t'affronte seul à seul.</p>`,
    choices:[{icon:'⚔️',text:'L\'affronter !',next:'cb_loup_chef'},{icon:'🏃',text:'Sprinter vers le phénix pendant qu\'il charge',next:'l1_sprint'}]},

  l1_sprint:{mood:'forest',art:'🏃🐦‍🔥',title:'Le sprint',
    text:`<p>Tu plonges sous l'attaque du loup, roules sur le côté, et fonçes vers le phénix. Tu soulèves la branche à la force de tes deux bras. <em>-1 HP.</em></p>
<p>Le phénix bondit dans tes bras, chaud comme une petite bouillotte. Le loup chef t'observe s'éloigner, surpris par ta témérité. Il ne vous poursuit pas.</p>`,
    choices:[{icon:'🛡️',text:'Remercier le phénix',next:'l1_win'}]},

  l1_discret:{mood:'forest',art:'🤫🐦‍🔥',title:'La discrétion',
    text:`<p>Tu te glisses silencieusement entre les arbres, contournant les loups qui ont le dos tourné. Ton cœur bat fort. Tu gardes les yeux sur la branche.</p>
<p>Tu la soulèves doucement. Le phénix te regarde sans faire un bruit — il a compris. Il se love contre toi.</p>
<p>Un loup se retourne. Vos regards se croisent. Il montre les dents.</p>`,
    choices:[
      {icon:'🏃',text:'Courir à toute vitesse !',next:'l1_fuite'},
      {icon:'⚔️',text:'Faire face au loup seul — les autres n\'ont pas vu',hint:'→ Combat 1v1, plus facile',next:'cb_loup_seul'},
    ]},

  l1_fuite:{mood:'forest',art:'🏃💨',title:'La fuite',
    text:`<p>Tu sprintes entre les arbres, le phénix serré contre ta poitrine. Les loups hurlent derrière vous. Mais le phénix ouvre les yeux, crache une petite boule de feu qui explose en lumière aveuglante — les loups perdent votre trace.</p>
<p>Tu t'arrêtes dans une clairière tranquille, hors d'haleine. Le phénix te regarde avec des yeux reconnaissants.</p>`,
    choices:[{icon:'🛡️',text:'Accepter la récompense du phénix',next:'l1_win'}]},

  l1_win:{mood:'forest',art:'🐦‍🔥🛡️✨',title:'Le Bouclier de feu',
    text:`<p>Le phénix se dresse sur ton épaule. Il chante trois notes claires, puis touche ta main de son bec. Une de ses écailles dorées se détache et grandit dans tes paumes — un bouclier léger comme une plume, chaud comme le soleil, qui brille d'une lumière orange.</p>
<p><em>"Sa magie repousse les ombres,"</em> sembles-tu comprendre instinctivement. <em>"Et protège contre les coups les plus forts."</em></p>`,
    items_given:['bouclier_feu'],
    choices:[{icon:'🗼',text:'Suivre le phénix vers la tour au fond de la clairière',hint:'🛡️ Bouclier de feu obtenu !',next:'l2'}]},

  l2:{mood:'dungeon',art:'🗼🌫️',title:'La tour du gardien oublié',
    text:`<p>Le phénix te guide vers une vieille tour de pierre couverte de lierre noir. À l'entrée, un chevalier en armure rouillée monte la garde, immobile comme une statue.</p>
<p>Mais quand tu t'approches, il bouge. Lentement. Sa visière se lève. Des yeux vieux, très vieux, te regardent.</p>
<p><em>"Qui va là ? Ami ou ennemi de la Reine Selena ?"</em> Il s'est arrêté dans le temps. Il garde ce poste depuis cent ans — sans savoir que la guerre est finie.</p>`,
    choices:[
      {icon:'⚔️',text:'Le défier en duel pour passer',hint:'→ Combat difficile. Bouclier utile.',next:'cb_chevalier'},
      {icon:'💬',text:'Lui expliquer doucement que la guerre est finie',next:'l2_parler'},
      {icon:'🌟',text:'Lui montrer les étoiles qui s\'éteignent dans le ciel',next:'l2_etoiles'},
    ]},

  l2_parler:{mood:'mystery',art:'🗼💬',title:'Cent ans de garde',
    text:`<p><em>"La guerre est finie ?"</em> Il lâche sa lance. Elle tombe avec un bruit sourd. <em>"Cent ans ? J'ai gardé cent ans pour rien ?"</em></p>
<p>Il s'effondre sur un rocher. Ses épaules tremblent. Puis il se redresse, la mâchoire serrée. <em>"Non. Pas pour rien. J'ai gardé la forêt contre les envahisseurs. Et maintenant... il y a encore quelque chose à protéger."</em></p>
<p>Il connaît un raccourci vers le château — un passage creusé dans la roche, que lui seul connaît encore.</p>`,
    choices:[{icon:'🌲',text:'Suivre le vieux chevalier',next:'r1'}]},

  l2_etoiles:{mood:'mystery',art:'🌟🗼',title:'Les étoiles qui s\'éteignent',
    text:`<p>Tu le prends par le bras et tu lui fais regarder le ciel nocturne. Effectivement — des étoiles clignotent, hésitent, puis s'éteignent une à une.</p>
<p>Le vieux chevalier reste silencieux longtemps. <em>"Alors quelque chose a changé. La forêt a besoin qu'on agisse."</em></p>
<p>Sans un mot de plus, il te montre un passage secret creusé dans la roche au pied de la tour.</p>`,
    choices:[{icon:'🌊',text:'Prendre le raccourci',next:'r1'}]},

  // L3 = R1 (rivière partagée)
  // L4 = village des lutins

  l4:{mood:'forest',art:'🍄🧌',title:'Le village des lutins et l\'ogre',
    text:`<p>Le chemin débouche sur un minuscule village de champignons géants illuminés de l'intérieur. Des lutins pas plus hauts que ta cheville s'agitent dans tous les sens.</p>
<p>Un ogre de brume est installé au bord du village, le chaudron de magie des lutins serré contre lui. Il est immense, gris, et... il pleure. Dans la boue devant lui, il a dessiné quelque chose avec son doigt — des silhouettes, une famille.</p>
<p>Le chef lutin accourt vers toi : <em>"Oh ! Une humaine ! Ce monstre a volé notre chaudron ! Sans lui, plus de soins, plus de protection !"</em></p>`,
    choices:[
      {icon:'⚔️',text:'Attaquer l\'ogre directement pour récupérer le chaudron',hint:'→ Combat. Difficile. Potion utile si tu en as.',next:'cb_ogre'},
      {icon:'👁️',text:'Observer l\'ogre avant d\'agir — pourquoi pleure-t-il ?',next:'l4_observer'},
      {icon:'🤝',text:'Aller lui parler directement',next:'l4_parler'},
    ]},

  l4_observer:{mood:'forest',art:'👁️🧌',title:'Ce que tu remarques',
    text:`<p>Tu te caches dans les hautes herbes et tu observes. L'ogre a une jambe plus faible — il boite. Et chaque fois qu'il entend le vent siffler entre les champignons, il s'arrête et écoute, les yeux perdus dans le vague.</p>
<p>La silhouette dans la boue : un grand ogre et deux petits. Une famille.</p>`,
    choices:[
      {icon:'🎵',text:'Fredonner une mélodie douce — peut-être qu\'il s\'arrêtera',next:'l4_melodie'},
      {icon:'⚔️',text:'Attaquer en visant sa jambe faible',hint:'→ Combat avec avantage (+2 ATK)',next:'cb_ogre_avantage'},
    ]},

  l4_melodie:{mood:'forest',art:'🎵🧌😢',title:'La mélodie',
    text:`<p>Tu fredonnes une vieille comptine. L'ogre s'arrête. Se retourne. Des larmes coulent sur ses joues de pierre grise.</p>
<p><em>"Ma maman me chantait ça,"</em> dit-il d'une voix qui ressemble à du gravier mouillé. <em>"Elle est... partie. Mes petits aussi. Je cherchais juste de la magie pour les retrouver."</em></p>
<p>Il pose le chaudron par terre, les mains tremblantes.</p>`,
    choices:[
      {icon:'💬',text:'Promettre de demander à la Reine où sont ses enfants',next:'l4_win_melodie'},
      {icon:'🏃',text:'Prendre le chaudron pendant qu\'il est distrait',next:'l4_win_vite'},
    ]},

  l4_win_melodie:{mood:'forest',art:'🧌🤝✨',title:'L\'accord',
    text:`<p>L'ogre te regarde longtemps pour voir si tu mens. Il décide de te faire confiance.</p>
<p>Les lutins récupèrent leur chaudron. Reconnaissants, ils te remettent une <strong>Potion de force</strong> et une <strong>Carte du château</strong> — dessinée de mémoire par leur ancêtre il y a cent ans.</p>`,
    items_given:['potion_force','carte_chateau'],
    choices:[{icon:'💎',text:'Continuer vers la Grotte des Cristaux',hint:'⚗️ Potion de force · 🗺️ Carte obtenues !',next:'g1'}]},

  l4_win_vite:{mood:'forest',art:'🏃💨',title:'La récupération express',
    text:`<p>Tu saisis le chaudron et tu cours. L'ogre rugit, mais tu es déjà loin. Tu le rends aux lutins.</p>
<p>Ils te remercient, mais quelque chose te pèse. L'ogre avait peut-être une bonne raison. Les lutins t'indiquent la route et te donnent une petite <strong>Carte du château</strong>.</p>`,
    items_given:['carte_chateau'],
    choices:[{icon:'💎',text:'Vers la Grotte des Cristaux',next:'g1'}]},

  l4_parler:{mood:'forest',art:'💬🧌',title:'La conversation',
    text:`<p><em>"Qu'est-ce que tu veux vraiment ?"</em> lui demandes-tu en t'asseyant sur un champignon pour montrer que tu n'es pas menaçante.</p>
<p>Il te regarde, stupéfait. Personne ne lui avait jamais posé cette question. Il raconte — ses deux petits emportés par une tempête magique, sa femme disparue à sa recherche. Il voulait utiliser la magie du chaudron pour les retrouver.</p>
<p>Tu lui promets de demander à la Reine de la Nuit — elle voit tout dans la forêt. Il rend le chaudron sans résister. Les lutins te donnent une <strong>Carte du château</strong>.</p>`,
    items_given:['carte_chateau'],
    choices:[{icon:'💎',text:'Vers la Grotte des Cristaux',hint:'🗺️ Carte du château obtenue !',next:'g1'}]},

  // ──────────────────────────────────────────
  // ACTE 2B — ZOÉ
  // ──────────────────────────────────────────
  z1:{mood:'mystery',art:'🔮📜🌲',title:'Les runes de la forêt',
    text:`<p>Les runes sur les arbres ne sont pas de la décoration. Elles racontent quelque chose. Tu t'arrêtes, tu tends la main vers la première, et les mots arrivent dans ton esprit comme s'ils avaient attendu.</p>
<p><em>"Il y a deux gardiens dans cette forêt. Celui du jour. Celui de la nuit. Le Cristal les unit — séparés, ni l'un ni l'autre ne peut exister."</em></p>
<p>Plus loin, les runes continuent. Le chemin des symboles mène à l'entrée d'une bibliothèque creusée dans les racines d'un arbre millénaire.</p>`,
    choices:[
      {icon:'📜',text:'Tout lire attentivement — prendre le temps de tout déchiffrer',next:'z1_tout_lire'},
      {icon:'⚡',text:'Lire en diagonale et foncer vers la bibliothèque',next:'z1_vite'},
    ]},

  z1_tout_lire:{mood:'mystery',art:'📜✨',title:'L\'histoire complète',
    text:`<p>Tu passes une heure à déchiffrer chaque arbre. L'histoire de Selena se déroule devant toi dans son intégralité — sa joie d'autrefois, la sorcière jalouse, la malédiction progressive. Et une dernière rune, à moitié effacée : <em>"Le Cristal a toujours été double."</em></p>
<p>Au sol entre deux arbres, tu trouves quelque chose que tu n'aurais jamais vu si tu avais couru : une vieille <strong>Carte secrète</strong>, gravée dans une plaque d'argent.</p>`,
    items_given:['carte_secrete'],
    choices:[{icon:'📚',text:'Descendre dans la bibliothèque',hint:'🗺️ Carte secrète obtenue !',next:'z2'}]},

  z1_vite:{mood:'mystery',art:'⚡📚',title:'L\'essentiel',
    text:`<p>Tu attrapes les grandes lignes en courant : Selena maudite, cristal volé (ou pas ?), forêt en danger. Ça suffit pour l'instant.</p>
<p>Tu arrives à la bibliothèque plus vite, mais sans la carte cachée entre les racines.</p>`,
    choices:[{icon:'📚',text:'Entrer dans la bibliothèque',next:'z2'}]},

  z2:{mood:'mystery',art:'📚🕯️',title:'La bibliothèque sous les racines',
    text:`<p>Un escalier de terre battue descend dans la douceur. En bas : une salle circulaire, des étagères de bois qui montent jusqu'au plafond de racines entremêlées, et des milliers de livres qui brillent doucement comme des lucioles endormies.</p>
<p>Une bougie flotte seule au centre de la pièce, éclairant trois livres posés sur un pupitre. Une inscription les surmonte : <em>"Tu n'as le temps d'en lire qu'un seul."</em></p>`,
    choices:[
      {icon:'📕',text:'"Histoire de Selena, gardienne des étoiles" — couverture rouge',hint:'→ Clé pour Fin Mystère',next:'z2_rouge'},
      {icon:'📘',text:'"Les deux cristaux jumeaux" — couverture bleue',hint:'→ Clé pour Fin Magique',next:'z2_bleu'},
      {icon:'📒',text:'"Comment briser une malédiction d\'isolement" — couverture dorée',hint:'→ Clé pour Fin Amitié',next:'z2_or'},
    ]},

  z2_rouge:{mood:'mystery',art:'📕✨',title:'Selena avant la nuit',
    text:`<p>Le livre s'ouvre tout seul. Des images apparaissent entre les lignes — une jeune femme aux cheveux étoilés, riant avec des animaux de la forêt, dansant sous la pluie d'étoiles filantes.</p>
<p>Tu apprends qui était vraiment Selena : brillante, curieuse, aimée. La gardienne des étoiles qui tissait chaque nuit la lumière du ciel. Et puis la jalousie d'une sorcière. La malédiction. Le silence progressif autour d'elle — ses amis qui partaient, ses animaux qui fuyaient. Cent ans de nuits seules.</p>
<p>La dernière page, différente des autres : <em>"Je ne suis pas un monstre. Je suis quelqu'un que personne n'a regardé."</em></p>`,
    choices:[{icon:'🔮',text:'Continuer — l\'esprit du miroir t\'attend',next:'z3'}]},

  z2_bleu:{mood:'mystery',art:'📘💎',title:'Les deux cristaux',
    text:`<p>La révélation arrive dès la deuxième page : il n'y a pas un cristal, mais deux. Un pour le jour — lumière, chaleur, croissance. Un pour la nuit — rêves, étoiles, repos. Séparés, ni l'un ni l'autre ne fonctionne complètement.</p>
<p>Le livre raconte comment, lors de la malédiction, le cristal de nuit s'est fracturé. Un fragment s'est caché quelque part dans la forêt. La "Reine de la Nuit" n'a jamais volé un cristal — elle garde depuis cent ans la seule moitié qui lui reste.</p>
<p>Coincé entre deux pages, tu trouves un éclat de cristal qui chante doucement dans ta main.</p>`,
    items_given:['fragment_cristal'],
    choices:[{icon:'🔮',text:'Continuer — l\'esprit du miroir t\'attend',hint:'💎 Fragment de cristal trouvé !',next:'z3'}]},

  z2_or:{mood:'mystery',art:'📒🔮',title:'Briser la malédiction',
    text:`<p>Le livre est direct : une malédiction d'isolement ne se brise pas par la force, ni même par la connaissance. Elle ne se brise que si la personne maudite <em>choisit</em> de faire confiance — et ce choix ne peut pas être forcé.</p>
<p>Il faut que la Reine le veuille. Personne ne peut le faire à sa place. Mais quelqu'un peut créer les conditions pour qu'elle y arrive.</p>
<p>Cette compréhension te semble plus précieuse que n'importe quelle arme.</p>`,
    choices:[{icon:'🔮',text:'Continuer — l\'esprit du miroir t\'attend',next:'z3'}]},

  z3:{mood:'mystery',art:'🪞👴',title:'L\'esprit du miroir',
    text:`<p>Dans un coin de la bibliothèque, un grand miroir ovale, couvert de toiles d'araignées. Tu souffles dessus. Dans le reflet, tu ne vois pas ton visage — tu vois un vieux monsieur aux yeux comme des puits profonds.</p>
<p><em>"Cent ans que personne ne me regarde,"</em> dit-il. <em>"Tu as droit à trois questions. Choisis bien."</em></p>`,
    choices:[
      {icon:'❓',text:'"Qui a maudit Selena ?"',next:'z3_q1'},
      {icon:'❓',text:'"Comment entrer dans le château sans combat ?"',next:'z3_q2'},
      {icon:'❓',text:'"Qu\'est-ce que Selena veut vraiment ?"',next:'z3_q3'},
      {icon:'❓',text:'"Qui es-tu ?"',next:'z3_q4'},
    ]},

  z3_q1:{mood:'mystery',art:'🪞✨',title:'La sorcière oubliée',
    text:`<p><em>"Une sorcière jalouse de la lumière de Selena. Mais la sorcière est morte depuis longtemps. Sa rancœur a continué toute seule — les malédictions de jalousie font ça. Elles n'ont plus besoin d'auteur pour durer."</em></p>`,
    choices:[{icon:'❓',text:'Poser une deuxième question',next:'z3'},{icon:'🌊',text:'Partir vers la Rivière des Voix',next:'r1'}]},

  z3_q2:{mood:'mystery',art:'🪞🏰',title:'Les trois entrées',
    text:`<p><em>"Il y a trois façons d'entrer dans le Château de Brume. La porte principale — gardée. Le jardin du souvenir — accessible à ceux qui apportent de la vie. Et le passage des rêves — ouvert seulement à ceux qui n'ont pas peur de voir la vérité en face."</em></p>`,
    choices:[{icon:'❓',text:'Poser une deuxième question',next:'z3'},{icon:'🌊',text:'Partir vers la Rivière des Voix',next:'r1'}]},

  z3_q3:{mood:'mystery',art:'🪞💔',title:'Ce que Selena veut',
    text:`<p>Le vieux monsieur dans le miroir marque une longue pause. <em>"Être vue. Pas sauvée. Pas vaincue. Juste... vue pour ce qu'elle est, au-delà de la malédiction. Personne ne le lui a jamais donné."</em></p>`,
    choices:[{icon:'❓',text:'Poser une deuxième question',next:'z3'},{icon:'🌊',text:'Partir vers la Rivière des Voix',next:'r1'}]},

  z3_q4:{mood:'mystery',art:'🪞😔',title:'Le bibliothécaire oublié',
    text:`<p><em>"J'étais le bibliothécaire de la forêt. J'ai passé ma vie à accumuler des secrets plutôt qu'à les partager. Un jour, j'ai regardé dans ce miroir et je ne suis plus ressorti."</em> Il sourit tristement. <em>"Ne fais pas comme moi."</em></p>`,
    choices:[{icon:'❓',text:'Poser une deuxième question',next:'z3'},{icon:'🌊',text:'Partir vers la Rivière des Voix',next:'r1'}]},

  // z4 = r1, z5 = pont, z6 = g1

  z5:{mood:'mystery',art:'💎🌉',title:'Le pont de cristal',
    text:`<p>Un pont suspendu au-dessus d'un gouffre sans fond. Les dalles sont de trois types : certaines avec une <strong>étoile dorée</strong> gravée, d'autres avec une <strong>lune grise</strong>, d'autres avec un <strong>soleil</strong>.</p>
<p>Sur le pilier d'entrée, une inscription : <em>"La vérité avance toujours. Le mensonge trébuche."</em> La lune, dans la pensée de la forêt, représente le doute. Le soleil... tu n'es pas sûre.</p>`,
    choices:[
      {icon:'⭐',text:'Ne marcher que sur les dalles étoilées — lentement mais sûrement',next:'z5_etoile'},
      {icon:'🌙',text:'Alterner étoiles et lunes pour aller plus vite',next:'z5_lune'},
      {icon:'☀️',text:'Tester d\'abord une dalle soleil — par curiosité',next:'z5_soleil'},
    ]},

  z5_etoile:{mood:'mystery',art:'⭐🌉',title:'La traversée prudente',
    text:`<p>Tu avances une dalle à la fois, en choisissant uniquement les étoiles dorées. Certaines dalles lune tremblent légèrement sous ton regard — tu as bien fait de les éviter.</p>
<p>De l'autre côté, la Grotte des Cristaux scintille devant toi.</p>`,
    choices:[{icon:'💎',text:'Entrer dans la Grotte',next:'g1'}]},

  z5_lune:{mood:'mystery',art:'💥🌉',title:'La chute partielle',
    text:`<p>La troisième dalle lune s'effondre sous ton pied. Tu chutes — mais tu attrapes le rebord de la dalle suivante juste à temps. <em>-2 HP.</em></p>
<p>Tu te hisses, tremblante, et traverses le reste sur les étoiles uniquement. De l'autre côté, tu souffles longuement.</p>`,
    choices:[{icon:'💎',text:'Entrer dans la Grotte',next:'g1'}]},

  z5_soleil:{mood:'mystery',art:'☀️✨',title:'La découverte',
    text:`<p>Tu poses un pied sur une dalle soleil avec précaution. Elle tient — solide, chaleureuse même. Tu traverses en utilisant étoiles et soleils, evitant les lunes.</p>
<p>Sur l'autre rive, une petite niche dans la roche contient une <strong>Potion de soin</strong> — comme si la forêt récompensait la curiosité prudente.</p>`,
    items_given:['potion_soin'],
    choices:[{icon:'💎',text:'Entrer dans la Grotte',hint:'💊 Potion de soin obtenue !',next:'g1'}]},

  // ──────────────────────────────────────────
  // ACTE 2C — MIA
  // ──────────────────────────────────────────
  m1:{mood:'forest',art:'🦌🌿',title:'La biche dans les ronces noires',
    text:`<p>Les empreintes dorées te mènent dans les sous-bois. Là, coincée dans des ronces noires magiques — qui ressèrent à chaque mouvement — une <strong>biche aux yeux dorés</strong> attend. Elle ne lutte plus. Elle conserve ses forces.</p>
<p>Quand elle te voit, ses yeux s'éclairent. <em>"Tu n'as pas reculé,"</em> dit-elle d'une voix aussi douce que de l'eau sur des galets. <em>"La plupart des humains fuient quand ils voient une biche parler."</em></p>`,
    choices:[
      {icon:'💚',text:'Démêler les ronces avec tes mains — ça va piquer, mais tant pis',next:'m1_mains'},
      {icon:'🌿',text:'Chercher une plante dissolvante dans les environs',next:'m1_plante'},
      {icon:'🎵',text:'Chanter une berceuse — la magie noire déteste peut-être la douceur',next:'m1_chanter'},
    ]},

  m1_mains:{mood:'forest',art:'🤝🦌',title:'Les mains courageuses',
    text:`<p>Les ronces piquent tes paumes. Tu continues. La biche reste parfaitement immobile, te faisant entièrement confiance.</p>
<p>La dernière ronce se brise. La biche se relève dans un halo de lumière et secoue sa crinière. Elle te regarde tes mains blessées et les touche de son museau — les égratignures disparaissent.</p>
<p><em>"Personne n'avait jamais fait ça pour moi."</em> Elle te tend une fleur que tu n'avais pas vue — nichée dans ses plumes. Une fleur de lumière.</p>`,
    items_given:['fleur_lumiere'],
    choices:[{icon:'🦌',text:'Partir avec Lunette comme guide',hint:'🌺 Fleur de lumière obtenue !',next:'m1_guide'}]},

  m1_plante:{mood:'forest',art:'🦉🌺',title:'La fleur de lumière',
    text:`<p>Un vieux hibou dans un arbre ouvre un œil. <em>"La plante que tu cherches pousse là où le sol brille doucement de lui-même,"</em> dit-il avant de refermer l'œil.</p>
<p>Tu cherches. Tu trouves — une <strong>Fleur de lumière</strong> dont les pétales pulsent d'une lumière dorée. Tu la poses sur les ronces noires. Elles se dissolvent en fumée bleue.</p>
<p>La biche est libre. Elle s'incline, puis te remet une autre fleur de lumière, née là où la première a touché le sol.</p>`,
    items_given:['fleur_lumiere'],
    choices:[{icon:'🦌',text:'Partir avec la biche comme guide',hint:'🌺 Fleur de lumière obtenue !',next:'m1_guide'}]},

  m1_chanter:{mood:'forest',art:'🎵🌸✨',title:'La mélodie dissolvante',
    text:`<p>Tu fredonnes une berceuse d'enfance. Les ronces noires hésitent. Puis se rétractent lentement, comme si elles ne savaient pas comment répondre à quelque chose d'aussi doux.</p>
<p>La biche regarde les ronces disparaître, stupéfaite. <em>"La douceur est la plus puissante des magies. Les gens l'oublient souvent."</em></p>
<p>Là où tu as chanté, une petite fleur pousse — une fleur de lumière, née de ta mélodie. Elle est à toi.</p>
<p>La biche ajoute : <em>"Cette douceur que tu as — elle peut toucher la Reine là où personne n'a réussi à l'atteindre."</em></p>`,
    items_given:['fleur_lumiere'],
    choices:[{icon:'🦌',text:'Partir avec la biche comme guide',hint:'🌺 Fleur de lumière + info clé obtenus !',next:'m1_guide'}]},

  m1_guide:{mood:'forest',art:'🌸🦌🌲',title:'Lunette la guide',
    text:`<p>La biche se présente : elle s'appelle <strong>Lunette</strong>. Elle connaît chaque centimètre de la forêt — les chemins que personne n'emprunte, les raccourcis que les cartes n'ont jamais répertoriés.</p>
<p>Avec elle, la forêt semble s'ouvrir autour de toi. Les buissons s'écartent, les branches se lèvent. Vous avancez en harmonie.</p>`,
    choices:[{icon:'🍄',text:'Vers le village des lutins',next:'m2'},{icon:'🌊',text:'Vers le lac et le pavillon',next:'m3'}]},

  m2:{mood:'forest',art:'🍄🧌🌸',title:'Le village des lutins et l\'ogre (version Mia)',
    text:`<p>Lunette entre dans le village la tête haute. Les lutins se figent. Et l'ogre, lui aussi, recule d'un pas. Il reconnaît la biche — une gardienne de la forêt. Il lâche légèrement le chaudron.</p>
<p><em>"Je... je ne voulais pas de problèmes,"</em> dit-il, plus petit qu'il n'est.</p>`,
    choices:[
      {icon:'🌸',text:'Écouter l\'ogre raconter pourquoi il a pris le chaudron',next:'m2_ecouter'},
      {icon:'🤝',text:'Demander à Lunette de lui parler dans sa langue',next:'m2_lunette'},
      {icon:'💚',text:'Rester silencieuse et le laisser parler jusqu\'au bout',next:'m2_silence'},
    ]},

  m2_ecouter:{mood:'forest',art:'💬🧌',title:'L\'histoire de l\'ogre',
    text:`<p>L'ogre raconte. Sa voix grave tremble. Ses deux petits ont disparu pendant une tempête magique il y a trois hivers. Il a tout essayé. Il pensait que la magie du chaudron des lutins pourrait créer une potion de localisation.</p>
<p>Tu promets de demander à la Reine — elle voit tout dans la forêt. L'ogre rend le chaudron. Les lutins, soulagés, te remettent une <strong>Carte du château</strong>.</p>`,
    items_given:['carte_chateau'],
    choices:[{icon:'🌊',text:'Continuer avec Lunette',hint:'🗺️ Carte du château obtenue !',next:'m3'}]},

  m2_lunette:{mood:'forest',art:'🦌🧌💬',title:'Deux gardiens',
    text:`<p>Lunette s'avance et touche le museau de l'ogre de son front. Un long silence. <em>"Nous sommes tous les deux des gardiens,"</em> dit-elle doucement. <em>"Et tous les deux, nous avons perdu quelque chose."</em></p>
<p>L'ogre pose le chaudron par terre sans un mot. Les lutins récupèrent leur bien. En échange, ils te remettent une <strong>Carte du château</strong>. L'ogre, lui, se joint à votre groupe pour un temps.</p>`,
    items_given:['carte_chateau'],
    choices:[{icon:'🌊',text:'Vers le lac',hint:'🗺️ Carte du château obtenue !',next:'m3'}]},

  m2_silence:{mood:'forest',art:'🤫🧌',title:'Le silence qui suffit',
    text:`<p>Tu ne dis rien. Tu t'assieds. Tu attends. Lunette fait pareil. L'ogre vous regarde, perdu — personne ne l'a jamais laissé parler sans l'interrompre.</p>
<p>Il parle. Longtemps. Et à la fin, il pose le chaudron par terre lui-même. <em>"Ça fait du bien,"</em> dit-il simplement.</p>
<p>Les lutins, les larmes aux yeux, te donnent une <strong>Carte du château</strong>. L'ogre propose de t'escorter jusqu'à l'entrée.</p>`,
    items_given:['carte_chateau'],
    choices:[{icon:'🌊',text:'Vers le lac avec ta petite troupe',hint:'🗺️ Carte du château obtenue !',next:'m3'}]},

  m3:{mood:'mystery',art:'🌊🏛️',title:'Le lac et le pavillon des souvenirs',
    text:`<p>Lunette t'emmène sur un chemin que personne d'autre ne connaît, au bord d'un lac immobile, noir comme un miroir. Au centre du lac, un pavillon de verre flotte sur l'eau sans logique apparente, illuminé de l'intérieur d'une lumière chaude.</p>`,
    choices:[
      {icon:'🚶',text:'Traverser sur les nénuphars géants et entrer dans le pavillon',next:'m3_entrer'},
      {icon:'🔍',text:'Observer depuis le bord sans approcher',next:'m3_observer'},
      {icon:'🌸',text:'Poser ta fleur de lumière sur l\'eau comme offrande',requires_item:'fleur_lumiere',next:'m3_fleur'},
    ]},

  m3_entrer:{mood:'mystery',art:'🏛️✨',title:'Les souvenirs de Selena',
    text:`<p>Le pavillon est rempli d'hologrammes de lumière dorée — des scènes de la vie de Selena. Elle rit avec des amis. Elle tisse des étoiles de ses doigts. Elle danse sous la pluie de météores.</p>
<p>Puis les images changent. Ses amis partent. Les animaux fuient. Le silence s'installe, puis s'éternise. La dernière image : elle seule, assise au milieu d'un château vide, serrant le Cristal contre elle comme si c'était la dernière chose vivante dans son monde.</p>
<p>Tu comprends quelque chose de très important : elle n'est pas méchante. Elle a eu terriblement peur d'être invisible.</p>`,
    choices:[{icon:'🏰',text:'Partir vers le château',next:'c1'}]},

  m3_observer:{mood:'mystery',art:'🌊👁️',title:'Depuis le bord',
    text:`<p>Tu aperçois les hologrammes de loin — des silhouettes lumineuses, des scènes de bonheur et de solitude. L'essentiel passe, même à distance.</p>`,
    choices:[{icon:'🏰',text:'Partir vers le château',next:'c1'}]},

  m3_fleur:{mood:'mystery',art:'🌺🌊🌟',title:'L\'étoile du lac',
    text:`<p>Tu poses la fleur à la surface de l'eau. Elle flotte un instant, puis le lac réagit — une onde douce, puis une étoile tombe du ciel et se pose dans l'eau sans couler, brillant doucement.</p>
<p>Tu la ramasses. Elle est tiède dans ta paume. <em>Un cadeau du lac pour quelqu'un qui donne sans rien demander.</em></p>`,
    items_given:['etoile_lac'],
    choices:[{icon:'🏰',text:'Vers le château',hint:'🌟 Étoile du lac obtenue !',next:'c1'}]},

  // ──────────────────────────────────────────
  // SCÈNES PARTAGÉES
  // ──────────────────────────────────────────
  r1:{mood:'mystery',art:'🌊🎵',title:'La Rivière des Voix',
    text:`<p>La rivière chante. Pas comme de l'eau normale — des voix émergent du courant, claires et contradictoires. <em>"Va à droite !"</em> <em>"Non, à gauche !"</em> <em>"Fais demi-tour !"</em></p>
<p>Sur une pierre plate à l'entrée de la rivière, des mots gravés : <em>"La vérité vient toujours du fond."</em></p>`,
    choices:[
      {icon:'👇',text:'Écouter la voix la plus grave, celle des profondeurs',next:'r1_fond'},
      {icon:'🏃',text:'Ignorer toutes les voix et traverser vite',next:'r1_vite'},
      {icon:'🎵',text:'Chanter plus fort que les voix pour les faire taire',requires_item:'plume_doree',next:'r1_chanter'},
    ]},

  r1_fond:{mood:'mystery',art:'🌊⭐',title:'La voix du fond',
    text:`<p>Tu fermes les yeux et écoutes. La voix grave dit : <em>"Pose tes pieds uniquement sur les pierres argentées."</em></p>
<p>Tu traverses sans te mouiller. La rivière, comme reconnaissante, dépose à tes pieds une plume dorée si tu n'en as pas encore.</p>`,
    items_given_conditional:'plume_doree',
    choices:[{icon:'💎',text:'Continuer vers la Grotte des Cristaux',next:'g1'},{icon:'🍄',text:'Prendre le chemin du village des lutins',next:'l4'}]},

  r1_vite:{mood:'mystery',art:'💦😅',title:'L\'éclaboussure',
    text:`<p>Tu sprintes. Une pierre glisse sous ton pied. Tu tombes à genoux dans l'eau froide — <em>-1 HP</em>. Mais des petits poissons lumineux surgissent et te poussent vers la rive opposée, leurs nageoires scintillantes.</p>
<p>Sur l'autre rive, tu t'ébroues. La rivière rit doucement.</p>`,
    choices:[{icon:'💎',text:'Vers la Grotte des Cristaux',next:'g1'},{icon:'🍄',text:'Vers le village des lutins',next:'l4'}]},

  r1_chanter:{mood:'mystery',art:'🎵🌊🌟',title:'Le silence magique',
    text:`<p>Tu chantes plus fort. Les voix s'arrêtent une à une, comme si elles ne savaient pas quoi faire de ta mélodie. La rivière s'apaise. Un chemin de pierres argentées émerge juste sous la surface.</p>
<p>Tu traverses à pied sec. Sur l'autre rive, la rivière te souffle : <em>"Le château a une entrée secrète au nord, là où pousse une vigne aux fleurs de lune."</em></p>`,
    choices:[{icon:'💎',text:'Vers la Grotte des Cristaux',next:'g1'},{icon:'🍄',text:'Vers le village des lutins',next:'l4'}]},

  g1:{mood:'dungeon',art:'💎🌈',title:'La Grotte des Cristaux',
    text:`<p>La grotte est un rêve éveillé — des murs de cristaux multicolores qui projettent des arcs-en-ciel dans tous les sens. Mais le sol est un piège : une grille de dalles, certaines marquées d'une <strong>étoile dorée</strong> (solide), d'autres d'une <strong>lune grise</strong> (danger). Un papillon de lumière flotte à l'entrée, patient.</p>`,
    choices:[
      {icon:'🦋',text:'Suivre le papillon pas à pas',next:'g1_papillon'},
      {icon:'⭐',text:'Ne marcher que sur les étoiles dorées, très lentement',next:'g1_etoile'},
      {icon:'⚡',text:'Courir en diagonale — le plus vite possible',next:'g1_sprint'},
    ]},

  g1_papillon:{mood:'dungeon',art:'🦋💎✨',title:'Guidée par le papillon',
    text:`<p>Le papillon avance d'une dalle à la fois. Tu le suis exactement. Il évite les lunes avec une grâce naturelle.</p>
<p>De l'autre côté, dans une alcôve, un éclat de cristal chante doucement. Le papillon se pose dessus, puis sur ta main, puis s'envole — transformé en une minuscule fée qui s'incline et disparaît.</p>`,
    items_given:['fragment_cristal'],
    choices:[{icon:'🏰',text:'Vers le Château de Brume',hint:'💎 Fragment de cristal obtenu !',next:'c1'}]},

  g1_etoile:{mood:'dungeon',art:'⭐💎',title:'La traversée prudente',
    text:`<p>Tu avances avec une patience infinie. Une dalle à la fois. Quelques dalles lune tremblent à ton approche — tu as bien fait.</p>
<p>De l'autre côté, le fragment de cristal t'attend dans une alcôve, comme s'il savait que tu viendrais.</p>`,
    items_given:['fragment_cristal'],
    choices:[{icon:'🏰',text:'Vers le Château de Brume',hint:'💎 Fragment de cristal obtenu !',next:'c1'}]},

  g1_sprint:{mood:'dungeon',art:'💥🌑',title:'Le tunnel secret',
    text:`<p>Tu fonces. Une dalle lune s'effondre sous ton pied droit — tu tombes dans un tunnel sombre en dessous. <em>-2 HP.</em></p>
<p>Mais le tunnel t'amène directement au cœur de la grotte. Sur le sol, le fragment de cristal, comme posé là exprès.</p>`,
    items_given:['fragment_cristal'],
    choices:[{icon:'🏰',text:'Vers le Château de Brume',hint:'💎 Fragment de cristal obtenu !',next:'c1'}]},

  // ──────────────────────────────────────────
  // ACTE 3 — LE CHÂTEAU
  // ──────────────────────────────────────────
  c1:{mood:'dungeon',art:'🏰🌫️',title:'Le Château de Brume',
    text:`<p>Le château se dresse sur une colline noire. Ses tours montent dans les nuages. La brume qui l'entoure est vivante — elle forme des visages qui te regardent, des mains qui s'étirent vers toi, puis se dissolvent.</p>
<p>Trois accès s'offrent à toi.</p>`,
    choices:[
      {icon:'⚔️',text:'La porte principale — deux gardes d\'ombres barrent l\'entrée',hint:'→ Combat difficile',next:'cb_gardes'},
      {icon:'🗺️',text:'Utiliser ta carte pour trouver le passage secret',requires_item:'carte_secrete',next:'c1_carte_s'},
      {icon:'🗺️',text:'Utiliser la Carte du château pour trouver le passage secret',requires_item:'carte_chateau',next:'c1_carte_c'},
      {icon:'🌸',text:'Le jardin du souvenir — tu sens la vie de l\'autre côté du mur',requires_item:'fleur_lumiere',next:'c1_jardin'},
      {icon:'🌟',text:'L\'énigme de la porte — une voix te demande ce que tu cherches vraiment',next:'c1_enigme'},
    ]},

  c1_carte_s:{mood:'dungeon',art:'🗺️🚪✨',title:'Le passage des rêves',
    text:`<p>La carte secrète montre un panneau de pierre, au nord du château, sous une vigne aux fleurs de lune. Tu trouves le panneau, tu appuies — une porte s'ouvre en silence sur un couloir tapissé de miroirs.</p>
<p>Dans chaque miroir, tu te vois à des âges différents. Toujours curieuse. Toujours cherchant. Le couloir te mène directement à la bibliothèque de la Reine.</p>`,
    choices:[{icon:'📚',text:'Entrer dans la bibliothèque de la Reine',next:'c2b'}]},

  c1_carte_c:{mood:'dungeon',art:'🗺️🚪',title:'Le passage nord',
    text:`<p>La carte indique un passage discret dans les fondations, au nord. Tu le trouves facilement — une petite porte de bois, non gardée. Tu entres dans le château sans bruit.</p>`,
    choices:[{icon:'👑',text:'Chercher la Reine',next:'c3'}]},

  c1_jardin:{mood:'forest',art:'🌸🏰🌸',title:'Le jardin du souvenir',
    text:`<p>Tu longes le mur et trouves une porte de jardin, rouillée depuis longtemps. Mais quand tu t'approches avec la fleur de lumière, les plantes grises autour de toi commencent à verdoyer. Un à un, les buissons reprennent des couleurs. Un chemin s'ouvre.</p>
<p>Tu traverses le jardin en fleur jusqu'à une porte intérieure — non gardée. Le château lui-même semble te laisser entrer.</p>`,
    choices:[{icon:'🌸',text:'Vers la chambre des souvenirs',next:'c2c'}]},

  c1_enigme:{mood:'mystery',art:'🚪❓',title:'La question de la porte',
    text:`<p>Tu t'approches de la porte principale. Avant que tu n'atteignes les gardes, une voix émane de la pierre elle-même.</p>
<p><em>"Qu'est-ce que tu cherches vraiment ?"</em></p>`,
    choices:[
      {icon:'💎',text:'"Le Cristal des Étoiles."',next:'c1_enigme_cristal'},
      {icon:'💬',text:'"Comprendre pourquoi Selena souffre."',next:'c1_enigme_selena'},
      {icon:'🌟',text:'"Aider la forêt — et peut-être Selena aussi."',next:'c1_enigme_vrai'},
    ]},

  c1_enigme_cristal:{mood:'dungeon',art:'🚪❌',title:'La porte reste fermée',
    text:`<p>La porte ne bouge pas. Les gardes te regardent. <em>"Ce n'est pas ce que tu cherches vraiment,"</em> murmure la voix. <em>"Essaie encore."</em></p>`,
    choices:[{icon:'💬',text:'"Non. Je cherche... à comprendre."',next:'c1_enigme_vrai'},{icon:'⚔️',text:'Affronter les gardes',next:'cb_gardes'}]},

  c1_enigme_selena:{mood:'mystery',art:'🚪✨',title:'La porte s\'entrouvre',
    text:`<p>La porte commence à s'ouvrir. Pas complètement. <em>"Presque,"</em> dit la voix. <em>"Mais il y a autre chose, non ?"</em></p>`,
    choices:[{icon:'🌟',text:'"Et l\'aider, elle aussi — pas seulement la forêt."',next:'c1_enigme_vrai'}]},

  c1_enigme_vrai:{mood:'mystery',art:'🚪🌟✨',title:'La porte s\'ouvre',
    text:`<p>La porte s'ouvre en grand. Les gardes s'écartent sans un mot — comme si la porte elle-même avait donné l'ordre.</p>
<p>La voix murmure une dernière fois : <em>"Elle aussi, elle cherche quelque chose. Peut-être que vous pouvez vous aider mutuellement."</em></p>`,
    choices:[{icon:'👑',text:'Entrer dans le château',next:'c3'}]},

  c2a:{mood:'dungeon',art:'⚔️🎭',title:'La salle d\'armes',
    text:`<p>Des armures vides bordent la salle, figées dans des poses de combat. Au centre, un mannequin d'entraînement magique tourne lentement sur lui-même.</p>
<p><em>"La Reine ne reçoit que ceux qu'elle respecte,"</em> dit une voix sans corps. <em>"Prouve que tu mérites son attention."</em></p>`,
    choices:[
      {icon:'⚔️',text:'Accepter le duel d\'entraînement',next:'cb_mannequin'},
      {icon:'🚶',text:'Ignorer et passer — tu n\'as pas le temps',next:'c3_moins'},
    ]},

  c2a_win:{mood:'dungeon',art:'⚔️✨',title:'Prouvée',
    text:`<p>Le mannequin s'incline. La salle applaudit — les armures vides cognent leurs boucliers. Tu reprends <em>+2 HP</em>. La porte vers la salle du trône s'ouvre.</p>`,
    choices:[{icon:'👑',text:'Vers la Reine',next:'c3'}]},

  c3_moins:{mood:'dungeon',art:'🚶',title:'Passée sans prouver',
    text:`<p>Tu passes. Le mannequin ne t'arrête pas. Mais quelque chose dans le château change légèrement — la Reine sera plus méfiante en te voyant.</p>`,
    choices:[{icon:'👑',text:'Vers la Reine',next:'c3_mefiance'}]},

  c2b:{mood:'mystery',art:'📚🌙',title:'La bibliothèque secrète de la Reine',
    text:`<p>Des livres que personne n'a jamais lus — les journaux intimes de Selena sur cent ans. Tu en ouvres un au hasard, puis tu choisis.</p>`,
    choices:[
      {icon:'📖',text:'Lire les premières entrées — avant la malédiction',next:'c2b_debut'},
      {icon:'📖',text:'Lire les dernières entrées — ces cent dernières années',next:'c2b_fin'},
    ]},

  c2b_debut:{mood:'mystery',art:'📖✨',title:'Selena avant tout',
    text:`<p>Les premières entrées sont lumineuses — elle décrit ses nuits à tisser les étoiles, les animaux qui venaient lui rendre visite, sa fierté quand une étoile filante atteignait exactement la bonne fenêtre.</p>
<p><em>"Je suis heureuse,"</em> écrit-elle à la page 12. <em>"Je ne sais pas si je le mérite, mais je suis heureuse."</em></p>
<p>Savoir qui elle était t'aidera à lui parler.</p>`,
    choices:[{icon:'👑',text:'Aller la trouver',next:'c3_zoe_debut'}]},

  c2b_fin:{mood:'mystery',art:'📖💔',title:'Cent ans de silence',
    text:`<p>Les dernières entrées sont plus courtes. Les mots se raréfient. Certaines pages sont juste des dates, sans texte. D'autres ont des taches qui ressemblent à des larmes séchées.</p>
<p>La dernière entrée, datée d'hier : <em>"Je ne voulais pas voler le cristal. Je voulais juste qu'il brille pour moi aussi, une seule fois."</em></p>
<p>Tu refermes le livre, la gorge serrée.</p>`,
    choices:[{icon:'👑',text:'Aller la trouver',next:'c3_zoe_fin'}]},

  c2c:{mood:'mystery',art:'🌸🏛️',title:'La chambre des souvenirs',
    text:`<p>Une pièce ronde entièrement couverte d'hologrammes — la vie de Selena dans ses moindres détails. Tu reconnais certaines scènes du pavillon, mais ici c'est plus proche, plus réel.</p>
<p>Le dragon qui gardait le château t'a laissé passer. Il murmure derrière toi : <em>"Elle ne sait plus comment demander de l'aide. Elle a oublié que c'était possible."</em></p>`,
    choices:[{icon:'👑',text:'Aller trouver Selena',next:'c3_mia'}]},

  // ──────────────────────────────────────────
  // CONFRONTATION FINALE

  c3:{mood:'mystery',art:'👑🌑',title:'La Reine de la Nuit',

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const STATE={char:null,playerHp:10,maxHp:10,inventory:[],history:[],mood:'forest',combat:null,_cWin:null,_cLose:null};

function hasItem(k){return STATE.inventory.includes(k)}
function addItem(k){if(!hasItem(k)){STATE.inventory.push(k);sfx('pickup');renderInv()}}
function renderInv(){
  const b=document.getElementById('inventory-bar');
  if(!b)return;
  if(STATE.inventory.length===0){b.style.display='none';return}
  b.style.display='flex';
  b.innerHTML=STATE.inventory.map(k=>`<span title="${ITEMS[k]?.n||k}">${ITEMS[k]?.e||'?'}</span>`).join('');
}
function updateHP(){
  const pct=Math.max(0,STATE.playerHp/STATE.maxHp*100);
  const bar=document.getElementById('hp-bar');
  const txt=document.getElementById('hp-txt');
  if(bar){bar.style.width=pct+'%';bar.style.background=pct>60?'#10B981':pct>30?'#F59E0B':'#EF4444'}
  if(txt)txt.textContent=STATE.playerHp;
}
function renderCharPill(){
  const p=document.getElementById('char-pill'),h=document.getElementById('hp-wrap');
  if(!STATE.char){p.style.display='none';h.style.display='none';return}
  const c=CHARS[STATE.char];
  p.style.display='flex';p.style.color=c.color;p.innerHTML=c.emoji+' '+c.short;
  h.style.display='flex';updateHP();
}
function burst(n=25){
  const cols=['#C4B5FD','#F9A8D4','#FDE68A','#A7F3D0','#7C3AED','#EC4899'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div');el.className='particle';
    el.style.cssText=`left:${Math.random()*100}vw;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-delay:${Math.random()*.8}s`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),2500);
  }
}

// ══════════════════════════════════════════════
// COMBAT ENGINE
// ══════════════════════════════════════════════
function startCombat(key){
  const cfg=S[key];
  STATE.combat={enemy:{...cfg.enemy},defending:false,potionUsed:false};
  STATE._cWin=cfg.next_win;STATE._cLose=cfg.next_lose;
  if(STATE.mood!=='battle'){STATE.mood='battle';playAmbient('battle')}
  renderCombat();
}

function renderCombat(){
  const c=STATE.combat,ch=CHARS[STATE.char];
  const pp=Math.max(0,STATE.playerHp/STATE.maxHp*100);
  const ep=Math.max(0,c.enemy.hp/c.enemy.maxHp*100);
  document.getElementById('app').innerHTML=`
    <div class="combat-card pop-in">
      <div class="combat-title">⚔️ Combat — ${c.enemy.name}</div>
      <div class="combatants">
        <div class="combatant">
          <div class="c-emoji">${ch.emoji}</div>
          <div class="c-name">${ch.short}</div>
          <div class="c-hp" style="color:#34D399">❤️ ${STATE.playerHp}/${STATE.maxHp}</div>
          <div class="c-bar"><div class="c-bar-fill hp-p" style="width:${pp}%"></div></div>
        </div>
        <div class="vs">VS</div>
        <div class="combatant">
          <div class="c-emoji">${c.enemy.emoji}</div>
          <div class="c-name">${c.enemy.name}</div>
          <div class="c-hp" style="color:#F87171">💀 ${c.enemy.hp}/${c.enemy.maxHp}</div>
          <div class="c-bar"><div class="c-bar-fill hp-e" style="width:${ep}%"></div></div>
        </div>
      </div>
      <div class="dice-area" id="dice-area"><span style="color:#94A3B8">Choisis ton action !</span></div>
      <div class="combat-actions">
        <button class="combat-btn" onclick="cAction('attack')">⚔️ <span>Attaquer</span><span style="color:#C4B5FD;font-size:.78rem;margin-left:auto">dé 1-6 + ${ch.atkBonus} ATK</span></button>
        <button class="combat-btn" onclick="cAction('defend')">🛡️ <span>Défendre</span><span style="color:#C4B5FD;font-size:.78rem;margin-left:auto">+2 ATK prochain tour</span></button>
        ${hasItem('potion_force')&&!c.potionUsed?`<button class="combat-btn" onclick="cAction('potion')">⚗️ <span>Utiliser la Potion de force</span><span style="color:#F59E0B;font-size:.78rem;margin-left:auto">+3 ATK ce tour</span></button>`:''}
        ${hasItem('bouclier_feu')?`<button class="combat-btn" onclick="cAction('bouclier')">🛡️ <span>Lever le Bouclier de feu</span><span style="color:#C4B5FD;font-size:.78rem;margin-left:auto">Bloque un tour</span></button>`:''}
        ${hasItem('potion_soin')?`<button class="combat-btn" onclick="cAction('soin')">💊 <span>Potion de soin</span><span style="color:#34D399;font-size:.78rem;margin-left:auto">Récupère 4 HP</span></button>`:''}
      </div>
    </div>`;
}

function d6(){return Math.floor(Math.random()*6)+1}

function cAction(action){
  initAC();
  const c=STATE.combat,ch=CHARS[STATE.char];
  let log='',pDmg=0,skip=false;

  if(action==='attack'){
    const r=d6();pDmg=r+ch.atkBonus+(c.defending?2:0);c.defending=false;
    log=`<div class="dice-spin">🎲</div> Dé : <strong>${r}</strong> + ${ch.atkBonus}${c.defending?'+2':''} = <strong>${pDmg}</strong>`;
  } else if(action==='defend'){
    c.defending=true;skip=true;log='🛡️ Tu te mets en garde — +2 ATK au prochain tour.';
  } else if(action==='potion'){
    c.potionUsed=true;const r=d6();pDmg=r+ch.atkBonus+3;
    STATE.inventory=STATE.inventory.filter(i=>i!=='potion_force');renderInv();
    log=`⚗️ Potion ! <div class="dice-spin">🎲</div> ${r} + ${ch.atkBonus} + 3 = <strong>${pDmg}</strong>`;
  } else if(action==='bouclier'){
    skip=true;log='🛡️ Le Bouclier de feu absorbe toute l\'attaque ennemie ce tour !';
    document.getElementById('dice-area').innerHTML=log;
    document.querySelectorAll('.combat-btn').forEach(b=>b.disabled=true);
    sfx('magic');setTimeout(()=>{if(c.enemy.hp<=0)endCombat(true);else if(STATE.playerHp<=0)endCombat(false);else renderCombat()},1800);return;
  } else if(action==='soin'){
    skip=true;STATE.playerHp=Math.min(STATE.maxHp,STATE.playerHp+4);
    STATE.inventory=STATE.inventory.filter(i=>i!=='potion_soin');renderInv();updateHP();
    log='💊 Tu bois la potion de soin — +4 HP !';
  }

  if(!skip&&pDmg>0){
    const dmg=Math.max(1,pDmg-d6());c.enemy.hp=Math.max(0,c.enemy.hp-dmg);
    log+=`<br>💥 Tu infliges <strong>${dmg}</strong> dégâts !`;sfx('hit');
  }

  if(c.enemy.hp>0&&!skip){
    const er=d6(),eAtk=er+c.enemy.atk,pDef=d6()+1,taken=Math.max(0,eAtk-pDef);
    STATE.playerHp=Math.max(0,STATE.playerHp-taken);
    log+=`<br>👹 ${c.enemy.name} : ${er}+${c.enemy.atk}=${eAtk} vs déf ${pDef} — tu reçois <strong>${taken}</strong> dégâts.`;
    if(taken>0)sfx('damage');updateHP();
  } else if(action==='defend'||action==='soin'){
    const er=d6(),taken=action==='defend'?Math.max(0,er-1):0;
    if(action==='defend'&&c.enemy.hp>0){STATE.playerHp=Math.max(0,STATE.playerHp-taken);if(taken>0)sfx('damage');updateHP();log+=`<br>👹 Attaque réduite — ${taken} dégât${taken>1?'s':''}.`}
  }

  document.getElementById('dice-area').innerHTML=log;
  document.querySelectorAll('.combat-btn').forEach(b=>b.disabled=true);
  setTimeout(()=>{
    if(c.enemy.hp<=0)endCombat(true);
    else if(STATE.playerHp<=0)endCombat(false);
    else renderCombat();
  },2000);
}

function endCombat(won){
  STATE.combat=null;
  if(won){playAmbient('forest');STATE.mood='forest';sfx('victory');burst(30);render(STATE._cWin);}
  else{STATE.playerHp=Math.max(3,Math.floor(STATE.maxHp*.3));updateHP();render(STATE._cLose);}
}

// RENDER
function render(key){
  STATE.history.push(key);
  const scene=S[key];
  if(!scene){console.error('Unknown scene:',key);return;}
  if(scene.combat){startCombat(key);return;}
  if(scene.ending){renderEnding(scene);return;}
  if(scene.mood&&scene.mood!==STATE.mood){STATE.mood=scene.mood;playAmbient(scene.mood);}
  if(scene.items_given)scene.items_given.forEach(addItem);
  if(scene.items_given_conditional&&!hasItem(scene.items_given_conditional))addItem(scene.items_given_conditional);
  const choices=(scene.choices||[]).filter(c=>!c.requires_item||hasItem(c.requires_item));
  document.getElementById('app').innerHTML=`
    <div class="scene-art">${scene.art}</div>
    <div class="story-card">
      <div class="scene-title">${scene.title}</div>
      <div class="scene-text">${scene.text}</div>
    </div>
    <div class="choices">
      ${choices.map(c=>`
        <button class="choice-btn" onclick="choose('${c.next}',this)">
          <div class="choice-icon">${c.icon}</div>
          <div class="choice-body">
            <span class="choice-main">${c.text}</span>
            ${c.hint?`<span class="choice-hint">${c.hint}</span>`:''}
          </div>
        </button>`).join('')}
    </div>
  `;
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderEnding(scene){
  stopMusic();playAmbient('victory');sfx('victory');burst(40);
  const txt=scene.text.split('\n\n').map(p=>`<p>${p}</p>`).join('');
  document.getElementById('app').innerHTML=`
    <div class="scene-art" style="font-size:5.5rem">${scene.art}</div>
    <div class="story-card ending-card pop-in">
      <div class="end-badge" style="background:${scene.badgeColor}22;color:${scene.badgeColor};border:1px solid ${scene.badgeColor}55">${scene.badge}</div>
      <div class="end-title">${scene.title}</div>
      <div class="end-text">${txt}</div>
      <button class="restart-btn" onclick="restart()">&#x1F31F; Nouvelle aventure</button>
    </div>
  `;
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderTitle(){
  stopMusic();
  document.getElementById('char-pill').style.display='none';
  document.getElementById('hp-wrap').style.display='none';
  document.getElementById('inventory-bar').style.display='none';
  document.getElementById('app').innerHTML=`
    <div class="scene-art" style="font-size:4.5rem;margin-bottom:12px">&#x1F332;&#x2728;&#x1F319;</div>
    <div class="title-main">La For&ecirc;t<br>des &Eacute;toiles</div>
    <div class="title-sub">Une aventure dont tu es le h&eacute;ros &mdash; v3</div>
    <div class="story-card">
      <div class="scene-text">
        <p>La <strong>Reine de la Nuit</strong> a pris le Cristal des &Eacute;toiles. La for&ecirc;t s'&eacute;teint.</p>
        <p>Qui est-elle vraiment ? Chaque h&eacute;ro&iuml;ne vivra une aventure diff&eacute;rente &mdash; ses propres combats, ses propres d&eacute;couvertes, et peut-&ecirc;tre une v&eacute;rit&eacute; que les autres ne trouveront pas.</p>
      </div>
    </div>
    <div class="char-grid">
      ${Object.entries(CHARS).map(([k,c])=>`
        <div class="char-card" onclick="selectChar('${k}')">
          <div class="ch-emoji">${c.emoji}</div>
          <div class="ch-name">${c.name}</div>
          <div class="ch-trait">${c.trait}</div>
          <div class="ch-power">${c.power}</div>
          <div class="ch-stats">${c.stats}</div>
        </div>`).join('')}
    </div>
  `;
}

function selectChar(k){
  initAC();
  const c=CHARS[k];
  STATE.char=k;STATE.playerHp=c.maxHp;STATE.maxHp=c.maxHp;
  STATE.inventory=[];STATE.history=[];STATE.mood='forest';STATE.combat=null;
  renderCharPill();renderInv();
  playAmbient('forest');sfx('magic');
  render('start');
}

function choose(next,btn){
  sfx('click');btn.disabled=true;btn.style.opacity='.5';
  setTimeout(()=>render(next),250);
}

function restart(){
  STATE.char=null;STATE.inventory=[];STATE.history=[];STATE.combat=null;STATE.playerHp=10;
  renderTitle();
}

renderTitle();
</script>
</body>
</html>
